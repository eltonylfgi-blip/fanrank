<style>
  :root{
    color-scheme:dark;
    --bg:#0a0b12;--bg-soft:#10131d;--surface:#151926;--surface-2:#1b2030;
    --text:#f5f7fb;--muted:#aab2c6;--line:#30384d;--line-soft:#242b3d;
    --yellow:#ffd129;--yellow-ink:#211900;--blue:#63b3ff;--purple:#b986ff;--pink:#ff72c6;
    --green:#55e59a;--red:#ff718c;--gold:#ffd700;--silver:#cbd3e3;--bronze:#df9f69;
    --shadow:0 18px 60px rgba(0,0,0,.34);--focus:0 0 0 3px rgba(99,179,255,.35);
    --radius:18px;--ease:cubic-bezier(.2,.7,.2,1);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;min-height:100dvh;background:var(--bg);color:var(--text);
    font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    line-height:1.5;overflow-x:hidden;
  }
  button,input,textarea{font:inherit}
  button,a{touch-action:manipulation}
  button{cursor:pointer}
  a{color:inherit}
  .bgfx{position:fixed;inset:0;z-index:-2;pointer-events:none;background:
    radial-gradient(800px 520px at 8% -8%,rgba(255,209,41,.12),transparent 62%),
    radial-gradient(760px 540px at 94% 3%,rgba(185,134,255,.13),transparent 64%),
    radial-gradient(900px 620px at 50% 112%,rgba(99,179,255,.09),transparent 66%)}
  .gridfx{position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.17;background-image:
    linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
    background-size:32px 32px;mask-image:linear-gradient(to bottom,black,transparent 75%)}
  .wrap{width:min(1060px,100%);margin:0 auto;padding:18px 18px 88px}
  .skip-link{position:fixed;left:12px;top:-80px;z-index:100;background:var(--text);color:var(--bg);
    padding:10px 14px;border-radius:10px;font-weight:800}
  .skip-link:focus{top:12px}
  .top-actions{position:fixed;top:12px;right:12px;z-index:30;display:flex;gap:8px}
  .top-btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;min-height:44px;padding:7px 11px;
    border-radius:999px;border:1px solid var(--line);background:rgba(21,25,38,.92);color:var(--text);
    font-size:.78rem;font-weight:850;box-shadow:0 8px 30px rgba(0,0,0,.22);backdrop-filter:blur(12px)}
  .top-btn:hover{border-color:var(--yellow)}
  .top-btn svg{width:17px;height:17px}
  .lang-flag{display:block;width:23px;height:16px;border:1px solid rgba(255,255,255,.48);border-radius:3px;
    box-shadow:0 1px 5px rgba(0,0,0,.34);overflow:hidden;flex:0 0 auto}
  .lang-flag .flag-view{display:none}
  .lang-flag[data-flag="gb"] .flag-view-gb,.lang-flag[data-flag="es"] .flag-view-es{display:block}
  :focus-visible{outline:0;box-shadow:var(--focus)!important}
  .hidden{display:none!important}
  .sr-only{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
    clip:rect(0,0,0,0);white-space:nowrap;border:0}

  header{text-align:center;padding:14px 0 8px}
  .brand-lockup{position:relative;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:16px 8px 0}
  .logo{position:relative;display:inline-flex;align-items:center;text-decoration:none;isolation:isolate;
    filter:drop-shadow(0 10px 34px rgba(0,0,0,.38));transition:filter .3s ease}
  .logo-float{display:inline-flex;animation:logoFloatIdle 5.6s cubic-bezier(.45,0,.55,1) infinite}
  .logo-art{position:relative;display:inline-flex;align-items:flex-end;max-width:calc(100vw - 32px);padding:.18em .72em .43em;
    font-size:clamp(2.7rem,7.1vw,4.75rem);font-weight:950;line-height:.84;transform-origin:50% 72%;
    transition:transform .24s var(--ease),filter .24s ease}
  .logo-word{position:relative;z-index:2;display:inline-flex;align-items:flex-end;letter-spacing:-.078em;white-space:nowrap}
  .logo-fan,.rank-letter,.rank-k{display:inline-block;background:linear-gradient(105deg,#fff8b5 2%,var(--yellow) 23%,var(--blue) 58%,var(--purple) 82%,var(--pink));
    background-size:240% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 10px rgba(99,179,255,.14));transition:filter .28s ease,transform .28s var(--ease)}
  .logo-fan{position:relative;z-index:2;background:linear-gradient(180deg,#fff8b5 0%,#ffd129 57%,#ffad12 100%);
    -webkit-background-clip:text;background-clip:text}
  .brand-mark{position:absolute;z-index:0;left:.01em;top:.02em;display:inline-flex;width:1.2em;height:1.16em;
    transform:rotate(-10deg);filter:drop-shadow(0 0 8px rgba(255,23,79,.82)) drop-shadow(0 0 24px rgba(255,23,79,.42));
    transition:filter .24s ease}
  .brand-mark:after{content:"";position:absolute;right:.04em;top:.08em;width:.12em;height:.12em;border-radius:50%;background:#fff;
    box-shadow:0 0 12px 3px rgba(255,112,136,.88);opacity:.78}
  .brand-mark svg{display:block;width:100%;height:100%;overflow:visible}
  .brand-mark-heart{fill:url(#heartGradient);stroke:#ff9bac;stroke-width:2.2}
  .brand-mark-heart:not(.emblem-shine){transform-box:fill-box;transform-origin:50% 62%;animation:heartBeat 3.4s ease-in-out infinite}
  .brand-mark-heart.emblem-shine{fill:none;stroke:#fff6f7;stroke-width:4.5;stroke-linecap:round;opacity:.76}
  .brand-mark-team{display:none;fill:url(#starGradient);stroke:#fff7bd;stroke-width:2.5;stroke-linejoin:round}
  body.team-mode .brand-mark-heart{display:none}
  body.team-mode .brand-mark-team{display:block}
  body.team-mode .brand-mark{filter:drop-shadow(0 0 10px rgba(255,209,41,.72)) drop-shadow(0 0 26px rgba(255,209,41,.32))}
  .logo-rank{position:relative;display:inline-flex;align-items:flex-end;margin-left:.015em;padding:0 .01em .17em 0;font-style:italic}
  .rank-place{position:relative;z-index:2;display:inline-flex;align-items:flex-end}
  .rank-letter{position:relative;z-index:2}
  .rank-r{transform:translateY(.04em)}
  .rank-a{transform:translateY(-.05em)}
  .rank-n{transform:translateY(.06em)}
  .rank-k{position:relative;z-index:2;transform:translateY(.06em)}
  .podium-step{position:absolute;left:51%;bottom:-1.8em;z-index:1;display:grid;place-items:center;width:4em;height:1.12em;
    transform:translateX(-50%);border:1px solid rgba(255,255,255,.25);border-radius:.28em .28em .12em .12em;
    color:#0b0d14;font-size:.18em;font-style:normal;font-weight:950;letter-spacing:0;line-height:1}
  .rank-r .podium-step{background:linear-gradient(180deg,#f4f7ff,#9ba8c2)}
  .rank-a .podium-step{height:1.58em;background:linear-gradient(180deg,#fff09a,var(--yellow));box-shadow:0 0 14px rgba(255,209,41,.42)}
  .rank-n .podium-step{background:linear-gradient(180deg,#ffc28b,#c27649)}
  .rank-trophy{position:relative;z-index:3;flex:0 0 auto;width:.74em;height:.74em;margin-left:.09em;transform:translateY(-.07em) rotate(6deg);overflow:visible;
    color:var(--yellow);filter:drop-shadow(0 0 8px rgba(255,209,41,.72)) drop-shadow(0 0 18px rgba(255,174,32,.3));transition:transform .28s var(--ease),filter .28s ease}
  .logo:before{content:"";position:absolute;inset:-18px -28px;z-index:-1;border-radius:999px;opacity:0;
    background:radial-gradient(circle,rgba(255,255,255,.45) 0 2%,transparent 3%),
      radial-gradient(circle at 20% 80%,rgba(255,209,41,.55) 0 2%,transparent 3%),
      radial-gradient(circle at 82% 18%,rgba(99,179,255,.62) 0 2%,transparent 3%);
    background-size:46px 46px,58px 58px,64px 64px;pointer-events:none}
  .logo:hover,.logo:focus-visible,.logo.celestial{filter:drop-shadow(0 0 14px rgba(255,255,255,.52)) drop-shadow(0 0 30px rgba(99,179,255,.48))}
  .logo:hover .logo-float,.logo:focus-visible .logo-float,.logo.celestial .logo-float{animation:logoFloatActive 2.8s ease-in-out infinite}
  .logo:hover .logo-art,.logo:focus-visible .logo-art,.logo.celestial .logo-art{transform:translateY(-2px) scale(1.025)}
  .logo:hover .brand-mark,.logo:focus-visible .brand-mark,.logo.celestial .brand-mark{
    filter:drop-shadow(0 0 13px rgba(255,23,79,.96)) drop-shadow(0 0 36px rgba(255,23,79,.58))}
  .logo:hover .brand-mark-heart:not(.emblem-shine),.logo:focus-visible .brand-mark-heart:not(.emblem-shine),.logo.celestial .brand-mark-heart:not(.emblem-shine){animation-duration:1.8s}
  .logo:hover .logo-fan,.logo:focus-visible .logo-fan,.logo.celestial .logo-fan,
  .logo:hover .rank-letter,.logo:focus-visible .rank-letter,.logo.celestial .rank-letter,
  .logo:hover .rank-k,.logo:focus-visible .rank-k,.logo.celestial .rank-k{filter:drop-shadow(0 0 9px rgba(255,255,255,.44));animation:logoGradientFlow 1.9s linear infinite}
  .logo:hover .rank-trophy,.logo:focus-visible .rank-trophy,.logo.celestial .rank-trophy{transform:translateY(-.13em) rotate(11deg) scale(1.08);filter:drop-shadow(0 0 12px rgba(255,209,41,.95))}
  .logo:hover:before,.logo:focus-visible:before,.logo.celestial:before{animation:starBloom .95s var(--ease) both}
  .logo:hover + .eyebrow,.logo:focus-visible + .eyebrow,.logo.celestial + .eyebrow{animation:tagPop .82s var(--ease) both}
  @keyframes logoFloatIdle{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(0,-5px,0)}}
  @keyframes logoFloatActive{0%,100%{transform:translate3d(0,-2px,0)}50%{transform:translate3d(0,-8px,0)}}
  @keyframes heartBeat{0%,38%,58%,100%{transform:scale(1)}42%{transform:scale(1.075)}47%{transform:scale(.99)}52%{transform:scale(1.04)}}
  @keyframes logoGradientFlow{to{background-position:-240% 0}}
  @keyframes starBloom{0%{opacity:0;transform:scale(.75) rotate(-4deg)}45%{opacity:.95}100%{opacity:0;transform:scale(1.22) rotate(6deg)}}
  @keyframes tagPop{35%{transform:rotate(-4deg) translateY(-4px) scale(1.08)}100%{transform:rotate(-7deg) translateY(0) scale(1)}}
  .tag{max-width:760px;margin:9px auto 0;color:var(--muted);font-size:clamp(.92rem,2vw,1.08rem);font-weight:500;line-height:1.4}
  .tag b{color:var(--text)}
  .eyebrow{position:static;align-self:flex-end;display:inline-flex;align-items:center;margin-right:8%;padding:5px 10px;border:1px solid rgba(255,209,41,.72);
    border-radius:8px 11px 8px 10px;background:linear-gradient(105deg,var(--yellow),#ffab24);color:var(--yellow-ink);
    box-shadow:0 7px 24px rgba(255,209,41,.2);text-transform:uppercase;letter-spacing:.06em;
    font-size:clamp(.61rem,1.4vw,.72rem);font-style:italic;font-weight:950;transform:rotate(-7deg)}

  .search-area{position:relative;max-width:790px;margin:16px auto 0;text-align:left}
  .field-label{display:block;margin:0 0 7px;font-size:.82rem;font-weight:800;color:var(--muted)}
  .search-shell{display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:10px;
    padding:7px 8px 7px 16px;border:1px solid #3d4660;border-radius:17px;background:rgba(21,25,38,.96);
    box-shadow:var(--shadow);transition:border-color .2s ease,transform .2s var(--ease)}
  .search-shell:focus-within{border-color:var(--blue);transform:translateY(-1px)}
  .search-shell svg{width:23px;height:23px;color:var(--blue)}
  .search-shell input{min-width:0;height:48px;border:0;outline:0;background:transparent;color:var(--text);
    font-size:clamp(1rem,2.4vw,1.08rem)}
  .search-shell input::placeholder{color:#7f899f}
  .search-btn,.primary-btn{min-height:44px;border:0;border-radius:12px;padding:10px 18px;
    background:linear-gradient(100deg,var(--yellow),#ffb91f);color:var(--yellow-ink);font-weight:950;
    transition:filter .18s ease,transform .18s var(--ease)}
  .search-btn:hover,.primary-btn:hover{filter:brightness(1.07)}
  .search-btn:active,.primary-btn:active{transform:scale(.98)}
  .search-panel{position:absolute;left:0;right:0;top:calc(100% + 8px);z-index:25;padding:8px;
    border:1px solid var(--line);border-radius:15px;background:#141824;box-shadow:var(--shadow)}
  .search-result{display:grid;grid-template-columns:42px 1fr auto;align-items:center;gap:11px;width:100%;
    min-height:56px;padding:8px;border:0;border-radius:11px;background:transparent;color:var(--text);
    text-align:left;text-decoration:none}
  .search-result:hover,.search-result:focus-visible{background:var(--surface-2)}
  .result-avatar{display:grid;place-items:center;width:42px;height:42px;border:1px solid var(--line);
    border-radius:12px;background:var(--bg-soft);font-size:1.35rem}
  .result-title{display:block;font-weight:850}
  .result-meta{display:block;color:var(--muted);font-size:.78rem}
  .result-arrow{color:var(--muted);font-size:1.15rem}
  .search-empty{padding:14px;color:var(--muted)}
  .search-empty b{display:block;color:var(--text);margin-bottom:3px}
  .search-empty button{margin-top:10px}

  .hero-action-row{display:flex;align-items:center;justify-content:center;gap:11px;flex-wrap:wrap;margin:11px auto 0}
  .hero-suggest{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:48px;padding:10px 18px;border:1px solid rgba(255,114,198,.62);
    border-radius:13px;background:linear-gradient(115deg,rgba(255,114,198,.17),rgba(185,134,255,.12));color:#ffd9ee;font-weight:950;
    box-shadow:0 10px 32px rgba(255,114,198,.08);transition:transform .18s var(--ease),border-color .18s ease,background .18s ease}
  .hero-suggest span:first-child{color:var(--pink);font-size:1.08rem;filter:drop-shadow(0 0 8px rgba(255,114,198,.55))}
  .hero-suggest:hover{transform:translateY(-2px);border-color:var(--pink);background:linear-gradient(115deg,rgba(255,114,198,.24),rgba(185,134,255,.17))}
  .hero-action-note{color:var(--muted);font-size:.75rem}
  body.profile-live .hero-action-row{display:none}

  .crumb{display:flex;align-items:center;justify-content:center;gap:8px;margin:18px auto 0;
    color:var(--muted);font-size:.9rem}
  body.home-live .crumb{display:none}
  .crumb a{color:var(--blue);text-decoration:none}
  .crumb .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 5px rgba(85,229,154,.1)}

  .stats{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:12px 0 0}
  .stat{min-width:104px;padding:7px 13px;border:1px solid var(--line-soft);border-radius:12px;
    background:rgba(21,25,38,.78);text-align:center}
  .stat .n{font-size:1.1rem;font-weight:950;color:var(--yellow);font-variant-numeric:tabular-nums}
  .stat.green .n{color:var(--green)}
  .stat .l{margin-top:1px;color:var(--muted);font-size:.7rem;text-transform:uppercase;letter-spacing:.08em}

  .section-head{display:flex;align-items:end;justify-content:space-between;gap:16px;margin:24px 0 11px}
  .section-head h2{margin:0;font-size:clamp(1.18rem,3vw,1.48rem)}
  .section-head p{margin:3px 0 0;color:var(--muted);font-size:.88rem}
  .how{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin:30px 0 0}
  .step{padding:17px;border:1px solid var(--line-soft);border-radius:var(--radius);background:rgba(21,25,38,.72)}
  .step-icon{display:grid;place-items:center;width:38px;height:38px;border-radius:11px;background:var(--surface-2);
    color:var(--blue)}
  .step-icon svg{width:21px;height:21px}
  .step-title{margin-top:11px;font-weight:900}
  .step-desc{margin-top:4px;color:var(--muted);font-size:.8rem}

  .pro-block{position:relative;margin-top:30px;padding:22px;border:1px solid rgba(99,179,255,.38);border-radius:22px;
    background:linear-gradient(145deg,rgba(15,20,34,.98),rgba(25,20,40,.94));box-shadow:0 22px 70px rgba(0,0,0,.28);overflow:hidden}
  .pro-block:before{content:"";position:absolute;right:-110px;top:-150px;width:360px;height:360px;border-radius:50%;pointer-events:none;
    background:radial-gradient(circle,rgba(99,179,255,.17),transparent 68%)}
  .pro-head{position:relative;display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:end;gap:22px}
  .pro-kicker{display:inline-flex;align-items:center;gap:7px;color:var(--yellow);font-size:.7rem;font-weight:950;letter-spacing:.1em;text-transform:uppercase}
  .pro-kicker:before{content:"";width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 14px rgba(85,229,154,.75)}
  .pro-head h2{margin:5px 0 0;font-size:clamp(1.35rem,3.4vw,2rem);line-height:1.15}
  .pro-head p{max-width:680px;margin:7px 0 0;color:var(--muted);font-size:.88rem}
  .pro-pilot-note{max-width:230px;padding:10px 12px;border:1px solid rgba(255,209,41,.3);border-radius:12px;background:rgba(255,209,41,.06);
    color:var(--yellow);font-size:.73rem;font-weight:850;text-align:right}
  .pro-plans{position:relative;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:17px}
  .pro-card{display:flex;flex-direction:column;min-width:0;padding:17px;border:1px solid var(--line);border-radius:17px;background:rgba(15,18,29,.9)}
  .pro-card.recommended{border-color:rgba(255,209,41,.62);box-shadow:inset 0 0 0 1px rgba(255,209,41,.1),0 14px 38px rgba(0,0,0,.25)}
  .pro-card-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .pro-card-name{font-size:1rem;font-weight:950}
  .pro-badge{padding:3px 8px;border-radius:999px;background:rgba(255,209,41,.12);color:var(--yellow);font-size:.63rem;font-weight:950}
  .pro-price{margin-top:9px;font-size:1.65rem;font-weight:950;letter-spacing:-.04em}
  .pro-price small{color:var(--muted);font-size:.7rem;font-weight:750;letter-spacing:0}
  .pro-limit{min-height:36px;margin-top:2px;color:var(--blue);font-size:.78rem;font-weight:850;line-height:1.4}
  .pro-list{display:grid;gap:8px;margin:13px 0 16px;padding:0;list-style:none;color:var(--muted);font-size:.82rem;line-height:1.45}
  .pro-list li{display:grid;grid-template-columns:16px minmax(0,1fr);gap:6px}
  .pro-list li:before{content:"✦";color:var(--green);font-size:.68rem;margin-top:1px}
  .pro-card .secondary-btn,.pro-card .primary-btn{width:100%;margin-top:auto}
  .pro-guard{position:relative;display:flex;align-items:flex-start;gap:9px;margin-top:14px;padding:11px 13px;border:1px solid rgba(85,229,154,.25);
    border-radius:12px;background:rgba(85,229,154,.045);color:var(--muted);font-size:.76rem}
  .pro-guard b{color:var(--green)}
  .profile-pro{display:flex;align-items:center;justify-content:space-between;gap:14px;margin:12px 0 0;padding:13px 15px;
    border:1px solid rgba(99,179,255,.3);border-radius:14px;background:linear-gradient(110deg,rgba(99,179,255,.07),rgba(185,134,255,.06))}
  .profile-pro b{display:block}.profile-pro span{display:block;color:var(--muted);font-size:.76rem}

  .directory-block{position:relative;margin-top:15px;padding:17px;border:1px solid var(--line-soft);border-radius:22px;
    background:linear-gradient(145deg,rgba(21,25,38,.9),rgba(13,16,25,.78));box-shadow:0 20px 70px rgba(0,0,0,.18)}

function tx(key){
  var value = T[LANG][key];
  if(typeof value === "function"){
    return value.apply(null, Array.prototype.slice.call(arguments,1));
  }
  return value;
}
function byId(id){return document.getElementById(id);}
function esc(value){
  return String(value == null ? "" : value).replace(/[&<>"']/g,function(char){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[char];
  });
}
function safeUrl(value){
  try{
    var url = new URL(String(value));
    return (url.protocol === "https:" || url.protocol === "http:") ? url.href : "";
  }catch(error){return "";}
}
function fmt(value){
  var n = Number(value || 0);
  if(n >= 1000){return (n/1000).toFixed(1).replace(".0","") + "k";}
  return String(n);
}

async function api(path,options){
  var opts = options || {};
  var authHeaders = session && session.access_token ? {"Authorization":"Bearer " + session.access_token} : {};
  opts.headers = Object.assign({},API_HEADERS,authHeaders,opts.headers || {});
  var response = await fetch(SB_URL + "/rest/v1/" + path,opts);
  if(!response.ok){
    var error = new Error("HTTP " + response.status);
    error.status = response.status;
    throw error;
  }
  if(response.status === 204 || response.headers.get("content-length") === "0"){return null;}
  return response.json();
}

function normalizeEvidenceLink(value){
  var raw = String(value || "").trim();
  if(!raw || raw.length > 2048){return null;}
  var parsed;
  try{parsed = new URL(raw);}catch(error){return null;}
  if(parsed.protocol !== "https:" || parsed.username || parsed.password){return null;}
  parsed.hash = "";
  var host = parsed.hostname.toLowerCase().replace(/\.$/,"");
  var videoId = "";
  if(host === "youtu.be"){
    videoId = parsed.pathname.split("/").filter(Boolean)[0] || "";
  }else if(["youtube.com","www.youtube.com","m.youtube.com","youtube-nocookie.com","www.youtube-nocookie.com"].indexOf(host) >= 0){
    var segments = parsed.pathname.split("/").filter(Boolean);
    if(parsed.pathname === "/watch"){videoId = parsed.searchParams.get("v") || "";}
    else if(["shorts","live","embed"].indexOf(segments[0]) >= 0){videoId = segments[1] || "";}
    else{return null;}
  }else if(host.indexOf("youtube") >= 0 || host.indexOf("youtu.be") >= 0){
    return null;
  }
  if(videoId){
    if(!/^[A-Za-z0-9_-]{11}$/.test(videoId)){return null;}
    return {
      provider:"youtube",
      videoId:videoId,
      canonicalUrl:"https://www.youtube.com/watch?v=" + videoId,
      thumbnailUrl:"https://i.ytimg.com/vi/" + videoId + "/hqdefault.jpg",
      host:"youtube.com"
    };
  }
  if(!host || raw.indexOf("\n") >= 0 || raw.indexOf("\r") >= 0){return null;}
  return {provider:"web",videoId:null,canonicalUrl:parsed.href,thumbnailUrl:null,host:host};
}

function addEvidenceLink(value){

  var link = normalizeEvidenceLink(value);

  if(pendingLinks.some(function(item){return item.canonicalUrl === link.canonicalUrl;})){
    setMediaStatus(tx("evidence_link_duplicate"),"err");return false;
  }
  pendingLinks.push(link);
  byId("evidence-link-input").value = "";
  renderPendingLinks();
  saveDraft();

function addMediaFiles(files){
  if(!session){openAuth("suggest");return;}
  var allowed = ["image/png","image/jpeg","image/webp"];
  var next = Array.from(files || []);
  if(evidenceCount() + next.length > 3){setMediaStatus(tx("media_limit_error"),"err");return;}
  for(var i=0;i<next.length;i+=1){
    var file = next[i];
    if(allowed.indexOf(file.type) === -1){setMediaStatus(tx("media_type_error"),"err");return;}
    if(file.size > 5 * 1024 * 1024){setMediaStatus(tx("media_size_error"),"err");return;}
  }
  next.forEach(function(file){
    var duplicate = pendingMedia.some(function(item){return item.file.name === file.name && item.file.size === file.size && item.file.lastModified === file.lastModified;});
    if(!duplicate){pendingMedia.push({file:file,url:URL.createObjectURL(file)});}
  });
  renderPendingMedia();
}

function submissionTextParts(value){
  var full = String(value || "").trim();
  var flat = full.replace(/\s+/g," ");
  var sentenceEnd = flat.search(/[.!?](?:\s|$)/);
  var candidate = sentenceEnd >= 2 && sentenceEnd < 140 ? flat.slice(0,sentenceEnd+1) : flat;
  var title = candidate.length <= 140 ? candidate : candidate.slice(0,137).replace(/\s+\S*$/," ").trim() + "…";
  if(title.length < 3){title = flat.slice(0,140);}
  return {title:title,details:full === title ? null : full};
}

function randomReceipt(){
  var bytes = new Uint8Array(32);
  crypto.getRandomValues(bytes);
  var binary = "";
  bytes.forEach(function(value){binary += String.fromCharCode(value);});
  return btoa(binary).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/g,"");
}
async function hashReceipt(value){
  var bytes = new TextEncoder().encode(value);
  var digest = await crypto.subtle.digest("SHA-256",bytes);
  return Array.from(new Uint8Array(digest)).map(function(item){return item.toString(16).padStart(2,"0");}).join("");
}

function armCelestialAudio(){
  if(REDUCED || audioArmed){return;}
  var Context = window.AudioContext || window.webkitAudioContext;
  if(!Context){return;}
  try{
    audioContext = audioContext || new Context();
    audioContext.resume().then(function(){audioArmed = audioContext.state === "running";}).catch(function(){});
  }catch(error){}
}
function playCelestialChime(){
  if(REDUCED || !audioArmed || !audioContext || chimePlayed){return;}
  chimePlayed = true;
  setTimeout(function(){chimePlayed = false;},9000);
  [523.25,659.25,783.99,1046.5].forEach(function(frequency,index){
    var oscillator = audioContext.createOscillator();
    var gain = audioContext.createGain();
    oscillator.type = index === 1 ? "triangle" : "sine";
    oscillator.frequency.setValueAtTime(frequency,audioContext.currentTime);
    gain.gain.setValueAtTime(.0001,audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(index === 3 ? .018 : .026,audioContext.currentTime + .035 + index*.015);
    gain.gain.exponentialRampToValueAtTime(.0001,audioContext.currentTime + .52 + index*.04);
    oscillator.connect(gain).connect(audioContext.destination);
    oscillator.start();
    oscillator.stop(audioContext.currentTime + .62);
  });
}

function directoryScore(item,mode){
  if(mode === "featured"){
    var familiar = ["rubius","brawl-stars","discord","orslok","ibai","roblox","chatgpt","fanrank","x-twitter","claude","cuaderno-madre"];
    var familiarIndex = familiar.indexOf(item.slug);
    if(familiarIndex >= 0){return 20000-familiarIndex*1000;}
  }
  if(mode === "trending"){
    return Number(item.recent_ideas||0)*20 + Number(item.fan_votes||0)*18 + Number(item.reddit_upvotes||0)*.02;
  }
  if(mode === "popular"){
    return Number(item.reddit_upvotes||0) + Number(item.fan_votes||0)*25 + Number(item.ideas||0);
  }
  if(mode === "active"){
    return Number(item.ideas||0)*10 + Number(item.fan_votes||0)*15 + Number(item.recent_ideas||0)*5;
  }
  return 10000-Number(item.featured_rank||9999);
}
function directoryItems(){
  var list = sections.slice();
  if(directoryMode.indexOf("tag:") === 0){
    var selectedTag = directoryMode.slice(4);
    list = list.filter(function(item){return sectionTags(item).indexOf(selectedTag) >= 0;});
  }else if(directoryMode === "creators-es"){
    list = list.filter(function(item){return item.kind === "creator" && sectionTags(item).indexOf("spain") >= 0;});
  }else if(directoryMode === "games"){
    list = list.filter(function(item){return item.kind === "game";});
  }else if(directoryMode === "companies"){
    list = list.filter(function(item){return item.kind === "company";});
  }else if(directoryMode === "social"){
    list = list.filter(function(item){return item.kind === "social";});
  }else if(directoryMode === "ai"){
    list = list.filter(function(item){return item.kind === "ai";});
  }
  list.sort(function(a,b){
    return directoryScore(b,directoryMode)-directoryScore(a,directoryMode) ||
      Number(a.featured_rank||9999)-Number(b.featured_rank||9999);
  });
  return list;
}

function normalize(value){
  return String(value || "").toLocaleLowerCase(LANG === "es" ? "es" : "en")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}
function keywordTokens(value){
  var stop = {the:1,and:1,for:1,with:1,from:1,that:1,this:1,una:1,uno:1,los:1,las:1,para:1,con:1,que:1,del:1,por:1};
  return normalize(value).split(/[^a-z0-9]+/).filter(function(token){return token.length >= 3 && !stop[token];});
}
function similarIdeas(query){
  var clean = normalize(query);
  if(clean.length < 8){return [];}
  var queryTokens = keywordTokens(clean);
  var targetSection = currentSuggestionSection();
  var pool = targetSection ? allIdeas.filter(function(item){return item.section === targetSection;}) : [];
  return pool.map(function(item){
    var haystack = normalize((item.title || "") + " " + (item.title_es || ""));
    var tokens = keywordTokens(haystack);
    var overlap = queryTokens.filter(function(token){return tokens.indexOf(token) >= 0;}).length;
    var score = queryTokens.length ? overlap / queryTokens.length : 0;
    if(clean.length >= 12 && (haystack.indexOf(clean) >= 0 || clean.indexOf(haystack) >= 0)){score += .75;}
    return {item:item,score:score};
  }).filter(function(entry){return entry.score >= .34;})
    .sort(function(a,b){return b.score-a.score || Number(b.item.web_votes)-Number(a.item.web_votes);})
    .slice(0,3).map(function(entry){return entry.item;});
}

  }).join("");

      vote(Number(button.dataset.simVote),button);

  });
}
function searchMatches(query){
  var needle = normalize(query);
  var sectionMatches = sections.filter(function(item){
    var labels = sectionTags(item).map(tagLabel).join(" ");
    return normalize(item.name + " " + sectionTagline(item) + " " + item.kind + " " + kindLabel(item.kind) + " " + labels).indexOf(needle) >= 0;
  }).slice(0,4);
  var ideaMatches = allIdeas.filter(function(item){
    return normalize(ideaTitle(item) + " " + ideaReason(item)).indexOf(needle) >= 0;
  }).slice(0,5);
  return {sections:sectionMatches,ideas:ideaMatches};
}
function renderSearchPanel(query){
  var panel = byId("search-panel");
  if(!query.trim()){
    panel.classList.add("hidden");
    panel.innerHTML = "";
    return;
  }
  var matches = searchMatches(query);
  var html = "";
  matches.sections.forEach(function(item){

function rankScore(item){
  return Number(item.ai_score || 0) + Math.min(Number(item.web_votes || 0) * 2,20);
}
function officialTeamScore(item){
  return Number(item.owner_star_value || 0) * 1000 + Number(item.team_star_support_count || 0);
}
function teamRatingHtml(item){
  var ownerStars = Math.max(0,Math.min(5,Number(item.owner_star_value || 0)));
  var support = Math.max(0,Number(item.team_star_support_count || 0));
  if(!ownerStars && !support){return "";}
  return '<div class="team-rating-badge">' +
    (ownerStars ? '<span class="stars">' + esc(tx("team_rating_owner",ownerStars)) + '</span>' : '') +
    (support ? '<span class="team-support">' + esc(tx("team_rating_support",support)) + '</span>' : '') + '</div>';
}
function teamStarControlHtml(item){
  if(!(session && membership && secMeta && secMeta.verification_status === "verified")){return "";}
  var max = membership.role === "owner" ? 5 : Number(secMeta.team_member_star_cap || 1);
  var current = Math.max(0,Math.min(max,Number(myTeamStars.get(item.id) || 0)));
  var options = '<option value="0">—</option>';
  for(var value=1;value<=max;value+=1){
    options += '<option value="' + value + '" ' + (value === current ? 'selected' : '') + '>' + value + ' ★</option>';
  }
  return '<label class="team-star-control"><span class="team-star-label">' + esc(tx("team_star_label")) +
    '</span><select data-team-star="' + item.id + '" aria-label="' + esc(tx("team_star_label")) + '">' + options + '</select></label>';
}
function sortedIdeas(source){
  var list = (source || ideas).slice();
  if(sortMode === "balanced"){
    list.sort(function(a,b){
      return rankScore(b)-rankScore(a) || Number(b.ai_score)-Number(a.ai_score) ||
        Number(b.web_votes)-Number(a.web_votes) || Number(b.origin_upvotes)-Number(a.origin_upvotes);
    });
  }else if(sortMode === "ai"){
    list.sort(function(a,b){
      return Number(b.ai_score)-Number(a.ai_score) || Number(b.web_votes)-Number(a.web_votes) ||
        Number(b.origin_upvotes)-Number(a.origin_upvotes);
    });
  }else if(sortMode === "team"){
    list.sort(function(a,b){return officialTeamScore(b)-officialTeamScore(a) || rankScore(b)-rankScore(a);});
  }else if(sortMode === "source"){
    list.sort(function(a,b){return Number(b.origin_upvotes)-Number(a.origin_upvotes) || Number(b.ai_score)-Number(a.ai_score);});
  }else{
    list.sort(function(a,b){return Number(b.web_votes)-Number(a.web_votes) || Number(b.ai_score)-Number(a.ai_score);});
  }
  return list;
}
function fanPosition(id){
  var fanList = ideas.slice().sort(function(a,b){
    return Number(b.web_votes)-Number(a.web_votes) || Number(b.ai_score)-Number(a.ai_score);
  });
  return fanList.findIndex(function(item){return item.id === id;}) + 1;
}

    statHtml(ideas.reduce(function(sum,item){return sum+Number(item.web_votes||0);},0),tx("fan_votes"),true);

function renderPodium(){

    {item:top[1],rank:2,cls:"second"},
    {item:top[0],rank:1,cls:"first"},
    {item:top[2],rank:3,cls:"third"}
  ];
  byId("podium").innerHTML = positions.map(function(entry){
    if(!entry.item){return '<div></div>';}
    var score = sortMode === "fans" ? entry.item.web_votes : sortMode === "source" ? entry.item.origin_upvotes :
      sortMode === "ai" ? entry.item.ai_score : rankScore(entry.item);
    var scoreLabel = sortMode === "team" ? (Number(entry.item.owner_star_value || 0) ? Number(entry.item.owner_star_value) + "★" : Number(entry.item.team_star_support_count || 0) + "+") : fmt(score);
    return '<button class="podium-card ' + entry.cls + '" type="button" data-podium="' + entry.item.id + '">' +
      '<div class="podium-medal">#' + entry.rank + '</div><div class="podium-title">' + esc(ideaTitle(entry.item)) +

async function vote(id,button){
  setBusy(button,true);
  try{
    var voteBody = session ? {idea_id:id,voter:"user:" + session.user.id,user_id:session.user.id} :
      {idea_id:id,voter:visitorId(),user_id:null};
    await postRow("fr_votes",voteBody);
    markVoted(id);
    var item = ideas.find(function(row){return row.id === id;});
    if(item){item.web_votes = Number(item.web_votes||0)+1;}
    var globalItem = allIdeas.find(function(row){return row.id === id;});
    if(globalItem && globalItem !== item){globalItem.web_votes = Number(globalItem.web_votes||0)+1;}
    if(SECTION){
      renderProfile();
      renderSimilarIdeas();
      showToast(tx("vote_rank",fanPosition(id)),"ok");
    }else{
      renderTrending();
      renderSimilarIdeas();
      showToast(tx("home_vote_saved"),"ok");
    }
    sendEvent("vote",{section:globalItem ? globalItem.section : (SECTION || null),idea_id:id});
  }catch(error){
    if(error.status === 409){
      markVoted(id);
      if(SECTION){renderProfile();renderSimilarIdeas();}else{renderTrending();renderSimilarIdeas();}
      showToast(tx("already_voted"),"ok");
    }else{
      setBusy(button,false);
      showToast(tx("generic_error"),"err");
    }
  }
}
async function setTeamStar(id,select){
  if(!session || !membership){return;}
  var value = Number(select.value || 0);
  select.disabled = true;
  try{
    var result = await callRpc("fr_set_team_star",{p_idea_id:id,p_value:value});
    var returned = Array.isArray(result) ? result[0] : result;
    if(value){myTeamStars.set(id,value);}else{myTeamStars.delete(id);}
    var item = ideas.find(function(row){return row.id === id;});
    if(item && returned){
      item.owner_star_value = Number(returned.owner_star_value || 0);
      item.team_star_support_count = Number(returned.team_star_support_count || 0);
      item.team_interest_count = Number(returned.team_interest_count || 0);
    }
    var globalItem = allIdeas.find(function(row){return row.id === id;});
    if(globalItem && item){Object.assign(globalItem,{owner_star_value:item.owner_star_value,team_star_support_count:item.team_star_support_count,team_interest_count:item.team_interest_count});}
    renderProfile();
    sendEvent("team_star",{section:SECTION,idea_id:id,value:String(value)});
    showToast(tx("team_star_saved"),"ok");
  }catch(error){
    select.disabled = false;
    showToast(tx("generic_error"),"err");
  }
}
async function shareIdea(id){
  var item = ideas.find(function(row){return row.id === id;});
  if(!item){return;}
  var shareData = {title:"FanRank — " + secMeta.name,text:ideaTitle(item),url:withReferral(ideaUrl(item),"idea_share")};
  try{
    if(navigator.share){
      await navigator.share(shareData);
    }else if(navigator.clipboard){
      await navigator.clipboard.writeText(shareData.url);
    }else{
      window.prompt(tx("share"),shareData.url);
    }
    sendEvent("idea_share",{section:SECTION,idea_id:id});
    showToast(tx("shared"),"ok");
  }catch(error){
    if(error && error.name !== "AbortError"){showToast(tx("generic_error"),"err");}
  }
}

byId("fan-profile-form").addEventListener("submit",async function(event){

  var displayName = byId("fan-name").value.trim();
  var skills = Array.from(document.querySelectorAll('input[name="fan-skill"]:checked')).map(function(input){return input.value;});
  if(!/^[a-z0-9][a-z0-9-]{2,29}$/.test(handle) || displayName.length < 2 || displayName.length > 50 || skills.length > 5){
    setStatus("fan-profile-status",tx("fan_profile_error"),"err");
    return;
  }
  var button = byId("fan-profile-save");
  setBusy(button,true);
  setStatus("fan-profile-status","","");
  try{
    await callRpc("fr_upsert_my_fan_profile",{
      p_handle:handle,
      p_display_name:displayName,
      p_headline:byId("fan-headline").value.trim(),
      p_skills:skills,
      p_is_public:byId("fan-public").checked,
      p_available_for_opportunities:byId("fan-opportunities").checked

});
byId("fan-profile-share").addEventListener("click",async function(){

  var url = fanProfileUrl(currentFanProfile.handle);
  try{
    if(navigator.share){await navigator.share({title:"FanRank - " + currentFanProfile.display_name,url:url});}
    else if(navigator.clipboard){await navigator.clipboard.writeText(url);}
    else{window.prompt(tx("fan_profile_share"),url);}
    showToast(tx("profile_shared"),"ok");
  }catch(error){}

  setBusy(button,true);
  setStatus("password-change-status","","");

    if(result.error){throw result.error;}
    byId("password-change-input").value = "";
    setStatus("password-change-status",tx("password_change_ok"),"ok");

      var cleanRecoveryUrl = new URL(location.href);
      cleanRecoveryUrl.searchParams.delete("recover");

      RECOVERY_FLOW = false;

byId("request-form").addEventListener("submit",async function(event){
  event.preventDefault();
  var target = byId("request-target").value.trim();
  if(target.length < 3){
    setStatus("request-status",tx("required_error"),"err");
    byId("request-target").focus();
    return;
  }
  if(!validTiming("request-website","fr_last_request",30000)){
    setStatus("request-status",tx("too_fast"),"err");
    return;
  }
  var requestContact = byId("request-contact").value.trim();
  var requestConsent = byId("request-allow-contact").checked;
  if(requestContact && !requestConsent){
    setStatus("request-status",tx("contact_consent_error"),"err");
    byId("request-allow-contact").focus();
    return;
  }
  var button = byId("request-send");
  setBusy(button,true);
  setStatus("request-status","","");
  try{
    var requestReceipt = randomReceipt();
    await postRow("fr_submissions",{
      section:"section-request",title:target,
      author:byId("request-name").value.trim() || null,
      contact:requestContact || null,
      language:LANG,
      user_id:session ? session.user.id : null,
      attribution_mode:session ? "account" : "anonymous",
      allow_contact:!!requestContact && requestConsent,
      receipt_hash:await hashReceipt(requestReceipt)
    });
    storeReceipt(requestReceipt,target,"section-request");
    markWrite("fr_last_request");
    sendEvent("section_request",{value:target});
    setStatus("request-status",tx("request_ok"),"ok");
    byId("request-form").reset();
    formStartedAt = Date.now();
  }catch(error){
    setStatus("request-status",tx("generic_error"),"err");
  }finally{setBusy(button,false);}
});

byId("submit-form").addEventListener("submit",async function(event){
  event.preventDefault();
  var targetSection = currentSuggestionSection();
  if(!targetSection){
    setStatus("submit-status",tx("submit_target_error"),"err");
    byId("submit-target").focus();
    return;
  }
  var textParts = submissionTextParts(byId("submit-idea").value);
  if(textParts.title.length < 3){
    setStatus("submit-status",tx("required_error"),"err");
    byId("submit-idea").focus();
    return;
  }
  var identityMode = suggestionAttribution();
  var contact = identityMode === "contact" ? byId("submit-contact").value.trim() : "";
  var author = identityMode === "contact" ? byId("submit-name").value.trim() : "";
  var allowContact = identityMode === "contact" && byId("submit-allow-contact").checked;
  if(contact && !allowContact){
    setStatus("submit-status",tx("contact_consent_error"),"err");
    byId("submit-allow-contact").focus();
    return;
  }
  if(!validTiming("submit-website","fr_last_submission",30000)){
    setStatus("submit-status",tx("too_fast"),"err");
    return;
  }
  var button = byId("submit-send");
  setBusy(button,true);
  setStatus("submit-status","","");
  try{
    var receipt = randomReceipt();
    var receiptHash = await hashReceipt(receipt);
    var attribution = session && identityMode === "account" ? "account" : "anonymous";
    var categoryInput = document.querySelector('input[name="submit-category"]:checked');
    var categoryRequested = categoryInput ? categoryInput.value : "auto";
    var submissionPayload = {
      section:targetSection,title:textParts.title,
      details:textParts.details,
      author:author || null,
      contact:contact || null,
      language:LANG,
      user_id:session ? session.user.id : null,
      attribution_mode:attribution,
      allow_contact:!!contact && allowContact,
      receipt_hash:receiptHash,
      category_requested:categoryRequested,
      ai_training_consent:!!(session && byId("submit-training-consent").checked),
      evidence_links:pendingLinks.map(function(item){return item.canonicalUrl;})
    };
    if(pendingMedia.length){
      if(!session || !session.access_token){openAuth("suggest");throw new Error("AUTH_REQUIRED");}
      setMediaStatus(tx("media_uploading"),"");
      var formData = new FormData();
      ["section","title","details","author","contact","language","attribution_mode","receipt_hash","category_requested"].forEach(function(key){
        formData.append(key,submissionPayload[key] == null ? "" : String(submissionPayload[key]));
      });
      formData.append("allow_contact",String(submissionPayload.allow_contact));
      formData.append("ai_training_consent",String(submissionPayload.ai_training_consent));
      formData.append("website",byId("submit-website").value || "");
      pendingLinks.forEach(function(item){formData.append("links",item.canonicalUrl);});
      pendingMedia.forEach(function(item){formData.append("files",item.file,item.file.name || "capture");});
      var mediaResponse = await fetch(SB_URL + "/functions/v1/fanrank-feedback-intake",{
        method:"POST",
        headers:{"apikey":SB_KEY,"Authorization":"Bearer " + session.access_token},
        body:formData
      });
      if(!mediaResponse.ok){
        var mediaError = await mediaResponse.json().catch(function(){return {};});
        throw new Error(mediaError.error || "MEDIA_UPLOAD_FAILED");
      }
    }else{
      await postRow("fr_submissions",submissionPayload);
    }
    storeReceipt(receipt,textParts.title,targetSection);
    markWrite("fr_last_submission");
    sendEvent("submission",{section:targetSection,value:textParts.title.slice(0,180)});
    setStatus("submit-status",tx("submit_ok"),"ok");
    byId("submit-form").reset();
    suggestionSection = targetSection;
    if(!SECTION){populateSuggestionTargets();}
    toggleSuggestionIdentity();
    clearPendingMedia();
    clearPendingLinks();
    clearDraft();
    renderSimilarIdeas();
    renderSubmissionReceipt();
    formStartedAt = Date.now();
  }catch(error){
    setStatus("submit-status",tx("generic_error"),"err");
  }finally{setBusy(button,false);}
});

byId("claim-form").addEventListener("submit",async function(event){
  event.preventDefault();
  if(!session){openAuth("claim");return;}
  var name = byId("claim-name").value.trim();
  var role = byId("claim-role").value.trim();
  var contact = byId("claim-contact").value.trim();
  if(name.length < 2 || role.length < 2 || contact.length < 3){
    setStatus("claim-status",tx("required_error"),"err");
    if(name.length < 2){byId("claim-name").focus();}
    else if(role.length < 2){byId("claim-role").focus();}
    else{byId("claim-contact").focus();}
    return;
  }
  if(!validTiming("claim-website","fr_last_claim",60000)){
    setStatus("claim-status",tx("too_fast"),"err");
    return;
  }
  var proof = byId("claim-proof").value.trim();
  if(proof && !safeUrl(proof)){
    setStatus("claim-status",tx("required_error"),"err");
    byId("claim-proof").focus();
    return;
  }
  var button = byId("claim-send");
  setBusy(button,true);
  setStatus("claim-status","","");
  try{
    await postRow("fr_claims",{
      section:SECTION,name:name,role:role,contact:contact,
      proof_url:proof || null,
      message:byId("claim-message").value.trim() || null,
      user_id:session.user.id
    });
    markWrite("fr_last_claim");
    sendEvent("claim_request",{section:SECTION});
    setStatus("claim-status",tx("claim_ok"),"ok");
    byId("claim-form").reset();
    formStartedAt = Date.now();
  }catch(error){
    setStatus("claim-status",tx("generic_error"),"err");
  }finally{setBusy(button,false);}
});

async function boot(){
  applyStaticText();
  byId("hero-tag").innerHTML = SECTION ? tx("loading") : tx("hero_home");
  byId("crumb-text").textContent = SECTION ? tx("loading") : tx("all_profiles");
  sendEvent("page_view",{section:SECTION || null,value:referralSource()});
  try{
    await initAuth();
    await loadDirectory();
    if(FAN_HANDLE){await loadPublicFanProfile();}
    else if(SECTION){loadSection();}
    else{loadHome();}
    if(session && RECOVERY_FLOW){await openPasswordRecovery();}else{resumeAfterAuth();}
    await handlePendingInvite();
    if(QUICK_PRO && !RECOVERY_FLOW){
      QUICK_PRO = false;
      var cleanProUrl = new URL(location.href);
      cleanProUrl.searchParams.delete("pro");
      cleanProUrl.searchParams.delete("plan");
      history.replaceState(null,"",cleanProUrl.pathname + cleanProUrl.search + cleanProUrl.hash);
      setTimeout(function(){openPro(PRO_PLAN_PARAM);},0);
    }
  }catch(error){
    byId("sections").innerHTML = '<div class="empty-state">' + esc(tx("generic_error")) +
      '<br><button class="secondary-btn retry-btn" type="button" onclick="location.reload()">' +
      esc(LANG === "es" ? "Reintentar" : "Retry") + '</button></div>';
    byId("hero-tag").textContent = tx("generic_error");
  }
}
boot();
