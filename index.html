<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0b12">
<title>FanRank — the best ideas, ranked</title>
<meta name="description" content="Starting with Brawl Stars: vote on the ideas fans want most, or request the next game, creator or company profile.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="FanRank">
<meta property="og:title" content="FanRank - the best ideas, ranked">
<meta property="og:description" content="Vote on the improvements fans want most, or send one private suggestion in seconds.">
<meta property="og:url" content="https://eltonylfgi-blip.github.io/fanrank/">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="FanRank - the best ideas, ranked">
<meta name="twitter:description" content="Vote on the improvements fans want most, or send one private suggestion in seconds.">
<style>
  :root{
    color-scheme:dark;
    --bg:#0a0b12;--bg-soft:#10131d;--surface:#151926;--surface-2:#1b2030;
    --text:#f5f7fb;--muted:#aab2c6;--line:#30384d;--line-soft:#242b3d;
    --yellow:#ffd129;--yellow-ink:#211900;--blue:#63b3ff;--purple:#b986ff;--pink:#ff72c6;
    --green:#55e59a;--red:#ff718c;--gold:#ffd700;--silver:#cbd3e3;--bronze:#df9f69;
    --shadow:0 18px 60px rgba(0,0,0,.34);--focus:0 0 0 3px rgba(99,179,255,.35);
    --radius:18px;--ease:cubic-bezier(.2,.7,.2,1);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;min-height:100dvh;background:var(--bg);color:var(--text);
    font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    line-height:1.5;overflow-x:hidden;
  }
  button,input,textarea{font:inherit}
  button,a{touch-action:manipulation}
  button{cursor:pointer}
  a{color:inherit}
  .bgfx{position:fixed;inset:0;z-index:-2;pointer-events:none;background:
    radial-gradient(800px 520px at 8% -8%,rgba(255,209,41,.12),transparent 62%),
    radial-gradient(760px 540px at 94% 3%,rgba(185,134,255,.13),transparent 64%),
    radial-gradient(900px 620px at 50% 112%,rgba(99,179,255,.09),transparent 66%)}
  .gridfx{position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.17;background-image:
    linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
    background-size:32px 32px;mask-image:linear-gradient(to bottom,black,transparent 75%)}
  .wrap{width:min(1060px,100%);margin:0 auto;padding:18px 18px 88px}
  .skip-link{position:fixed;left:12px;top:-80px;z-index:100;background:var(--text);color:var(--bg);
    padding:10px 14px;border-radius:10px;font-weight:800}
  .skip-link:focus{top:12px}
  .top-actions{position:fixed;top:12px;right:12px;z-index:30;display:flex;gap:8px}
  .top-btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;min-height:44px;padding:9px 14px;
    border-radius:999px;border:1px solid var(--line);background:rgba(21,25,38,.92);color:var(--text);
    font-weight:850;box-shadow:0 8px 30px rgba(0,0,0,.22);backdrop-filter:blur(12px)}
  .top-btn:hover{border-color:var(--yellow)}
  .top-btn svg{width:18px;height:18px}
  :focus-visible{outline:0;box-shadow:var(--focus)!important}
  .hidden{display:none!important}
  .sr-only{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
    clip:rect(0,0,0,0);white-space:nowrap;border:0}

  header{text-align:center;padding:14px 0 8px}
  .brand-lockup{position:relative;display:inline-flex;align-items:flex-start;justify-content:center;padding:10px 42px 2px 8px}
  .logo{position:relative;display:inline-flex;align-items:baseline;text-decoration:none;font-size:clamp(2.55rem,7vw,4.35rem);font-weight:950;
    letter-spacing:-.075em;line-height:.92;background:linear-gradient(100deg,var(--yellow) 4%,#fff4a8 25%,var(--blue) 57%,var(--purple) 82%,var(--pink));
    background-size:180% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;isolation:isolate;
    filter:drop-shadow(0 9px 30px rgba(0,0,0,.34));transform-origin:50% 72%;
    transition:filter .35s ease}
  .logo-rank{font-style:italic}
  .logo-star{position:absolute;right:-.35em;top:-.28em;color:#fff;font-size:.3em;font-style:normal;letter-spacing:0;
    -webkit-text-fill-color:#fff;text-shadow:0 0 12px #fff,0 0 22px var(--blue);transform:rotate(10deg)}
  .logo:before{content:"";position:absolute;inset:-18px -28px;z-index:-1;border-radius:999px;opacity:0;
    background:radial-gradient(circle,rgba(255,255,255,.45) 0 2%,transparent 3%),
      radial-gradient(circle at 20% 80%,rgba(255,209,41,.55) 0 2%,transparent 3%),
      radial-gradient(circle at 82% 18%,rgba(99,179,255,.62) 0 2%,transparent 3%);
    background-size:46px 46px,58px 58px,64px 64px;pointer-events:none}
  .logo:after{content:"";position:absolute;top:-35%;bottom:-35%;left:-38%;width:22%;z-index:2;opacity:0;
    transform:skewX(-18deg);background:linear-gradient(90deg,transparent,rgba(255,255,255,.98),transparent);
    mix-blend-mode:screen;pointer-events:none}
  .logo:hover,.logo:focus-visible,.logo.celestial{animation:logoShakeSmooth .82s var(--ease) both;
    filter:drop-shadow(0 0 12px rgba(255,255,255,.5)) drop-shadow(0 0 28px rgba(99,179,255,.46))}
  .logo:hover:before,.logo:focus-visible:before,.logo.celestial:before{animation:starBloom .95s var(--ease) both}
  .logo:hover:after,.logo:focus-visible:after,.logo.celestial:after{animation:logoShine .8s var(--ease) both}
  .logo:hover + .eyebrow,.logo:focus-visible + .eyebrow,.logo.celestial + .eyebrow{animation:tagPop .82s var(--ease) both}
  @keyframes logoShakeSmooth{
    0%{transform:translate3d(0,0,0) rotate(0) scale(1)}
    20%{transform:translate3d(-2px,-3px,0) rotate(-1.1deg) scale(1.025)}
    40%{transform:translate3d(2px,-2px,0) rotate(.8deg) scale(1.035)}
    58%{transform:translate3d(-1px,-2px,0) rotate(-.45deg) scale(1.03)}
    76%{transform:translate3d(1px,-1px,0) rotate(.2deg) scale(1.02)}
    100%{transform:translate3d(0,-1px,0) rotate(0) scale(1.018)}
  }
  @keyframes logoShine{0%{left:-38%;opacity:0}22%{opacity:1}100%{left:118%;opacity:0}}
  @keyframes starBloom{0%{opacity:0;transform:scale(.75) rotate(-4deg)}45%{opacity:.95}100%{opacity:0;transform:scale(1.22) rotate(6deg)}}
  @keyframes tagPop{35%{transform:rotate(-4deg) translateY(-4px) scale(1.08)}100%{transform:rotate(-7deg) translateY(0) scale(1)}}
  .tag{max-width:760px;margin:9px auto 0;color:var(--muted);font-size:clamp(.92rem,2vw,1.08rem);line-height:1.4}
  .tag b{color:var(--text)}
  .eyebrow{position:absolute;right:0;top:0;display:inline-flex;align-items:center;padding:5px 10px;border:1px solid rgba(255,209,41,.72);
    border-radius:8px 11px 8px 10px;background:linear-gradient(105deg,var(--yellow),#ffab24);color:var(--yellow-ink);
    box-shadow:0 7px 24px rgba(255,209,41,.2);text-transform:uppercase;letter-spacing:.06em;
    font-size:clamp(.61rem,1.4vw,.72rem);font-style:italic;font-weight:950;transform:rotate(-7deg)}

  .search-area{position:relative;max-width:790px;margin:16px auto 0;text-align:left}
  .field-label{display:block;margin:0 0 7px;font-size:.82rem;font-weight:800;color:var(--muted)}
  .search-shell{display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:10px;
    padding:7px 8px 7px 16px;border:1px solid #3d4660;border-radius:17px;background:rgba(21,25,38,.96);
    box-shadow:var(--shadow);transition:border-color .2s ease,transform .2s var(--ease)}
  .search-shell:focus-within{border-color:var(--blue);transform:translateY(-1px)}
  .search-shell svg{width:23px;height:23px;color:var(--blue)}
  .search-shell input{min-width:0;height:48px;border:0;outline:0;background:transparent;color:var(--text);
    font-size:clamp(1rem,2.4vw,1.08rem)}
  .search-shell input::placeholder{color:#7f899f}
  .search-btn,.primary-btn{min-height:44px;border:0;border-radius:12px;padding:10px 18px;
    background:linear-gradient(100deg,var(--yellow),#ffb91f);color:var(--yellow-ink);font-weight:950;
    transition:filter .18s ease,transform .18s var(--ease)}
  .search-btn:hover,.primary-btn:hover{filter:brightness(1.07)}
  .search-btn:active,.primary-btn:active{transform:scale(.98)}
  .search-panel{position:absolute;left:0;right:0;top:calc(100% + 8px);z-index:25;padding:8px;
    border:1px solid var(--line);border-radius:15px;background:#141824;box-shadow:var(--shadow)}
  .search-result{display:grid;grid-template-columns:42px 1fr auto;align-items:center;gap:11px;width:100%;
    min-height:56px;padding:8px;border:0;border-radius:11px;background:transparent;color:var(--text);
    text-align:left;text-decoration:none}
  .search-result:hover,.search-result:focus-visible{background:var(--surface-2)}
  .result-avatar{display:grid;place-items:center;width:42px;height:42px;border:1px solid var(--line);
    border-radius:12px;background:var(--bg-soft);font-size:1.35rem}
  .result-title{display:block;font-weight:850}
  .result-meta{display:block;color:var(--muted);font-size:.78rem}
  .result-arrow{color:var(--muted);font-size:1.15rem}
  .search-empty{padding:14px;color:var(--muted)}
  .search-empty b{display:block;color:var(--text);margin-bottom:3px}
  .search-empty button{margin-top:10px}

  .crumb{display:flex;align-items:center;justify-content:center;gap:8px;margin:18px auto 0;
    color:var(--muted);font-size:.9rem}
  body.home-live .crumb{display:none}
  .crumb a{color:var(--blue);text-decoration:none}
  .crumb .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 5px rgba(85,229,154,.1)}

  .stats{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:12px 0 0}
  .stat{min-width:104px;padding:7px 13px;border:1px solid var(--line-soft);border-radius:12px;
    background:rgba(21,25,38,.78);text-align:center}
  .stat .n{font-size:1.1rem;font-weight:950;color:var(--yellow);font-variant-numeric:tabular-nums}
  .stat.green .n{color:var(--green)}
  .stat .l{margin-top:1px;color:var(--muted);font-size:.7rem;text-transform:uppercase;letter-spacing:.08em}

  .section-head{display:flex;align-items:end;justify-content:space-between;gap:16px;margin:24px 0 11px}
  .section-head h2{margin:0;font-size:clamp(1.18rem,3vw,1.48rem)}
  .section-head p{margin:3px 0 0;color:var(--muted);font-size:.88rem}
  .how{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin:30px 0 0}
  .step{padding:17px;border:1px solid var(--line-soft);border-radius:var(--radius);background:rgba(21,25,38,.72)}
  .step-icon{display:grid;place-items:center;width:38px;height:38px;border-radius:11px;background:var(--surface-2);
    color:var(--blue)}
  .step-icon svg{width:21px;height:21px}
  .step-title{margin-top:11px;font-weight:900}
  .step-desc{margin-top:4px;color:var(--muted);font-size:.8rem}

  .directory-block{position:relative;margin-top:15px;padding:17px;border:1px solid var(--line-soft);border-radius:22px;
    background:linear-gradient(145deg,rgba(21,25,38,.9),rgba(13,16,25,.78));box-shadow:0 20px 70px rgba(0,0,0,.18)}
  .directory-block .section-head{margin:0 0 12px}
  .directory-count{flex:0 0 auto;color:var(--muted);font-size:.78rem;font-weight:800}
  .filter-rail{display:flex;gap:7px;margin:0 -3px 13px;padding:3px;overflow-x:auto;scrollbar-width:thin;scroll-snap-type:x proximity}
  .directory-filter{display:inline-flex;align-items:center;gap:7px;min-height:42px;padding:8px 12px;border:1px solid var(--line);
    border-radius:999px;background:var(--bg-soft);color:var(--muted);font-size:.78rem;font-weight:900;white-space:nowrap;
    scroll-snap-align:start;transition:transform .18s var(--ease),border-color .18s ease,color .18s ease,background .18s ease}
  .directory-filter:hover{transform:translateY(-1px);border-color:var(--blue);color:var(--text)}
  .directory-filter[aria-pressed="true"]{border-color:rgba(255,209,41,.75);background:rgba(255,209,41,.11);color:var(--yellow);
    box-shadow:0 0 0 3px rgba(255,209,41,.06)}
  .sections{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
  .sec-card{position:relative;display:flex;flex-direction:column;min-width:0;min-height:180px;padding:14px;border:1px solid var(--line);
    border-radius:17px;background:linear-gradient(150deg,rgba(27,32,48,.98),rgba(17,20,31,.96));color:var(--text);
    transition:transform .2s var(--ease),border-color .2s ease,box-shadow .2s ease;overflow:hidden}
  .sec-card:before{content:"";position:absolute;inset:0;pointer-events:none;opacity:0;background:radial-gradient(280px 120px at 10% 0%,rgba(99,179,255,.13),transparent 68%);transition:opacity .2s ease}
  .sec-card:hover{transform:translateY(-3px);border-color:var(--yellow);box-shadow:0 14px 38px rgba(0,0,0,.3)}
  .sec-card:hover:before{opacity:1}
  .sec-card-main{position:relative;display:grid;grid-template-columns:46px minmax(0,1fr) auto;align-items:center;gap:10px;color:inherit;text-decoration:none}
  .sec-em{display:grid;place-items:center;width:46px;height:46px;border:1px solid var(--line-soft);border-radius:14px;background:var(--bg-soft);font-size:1.48rem}
  .sec-info{min-width:0}
  .sec-kind{display:block;margin-bottom:1px;color:var(--blue);font-size:.62rem;font-weight:950;text-transform:uppercase;letter-spacing:.08em}
  .sec-name{display:block;font-size:1.02rem;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sec-tag{display:-webkit-box;margin-top:8px;min-height:34px;color:var(--muted);font-size:.75rem;line-height:1.4;
    -webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .sec-card-foot{position:relative;display:flex;align-items:flex-end;justify-content:space-between;gap:8px;margin-top:auto;padding-top:11px}
  .sec-quick{display:inline-flex;align-items:center;justify-content:center;min-height:38px;padding:7px 10px;border:1px solid rgba(255,209,41,.48);
    border-radius:10px;background:rgba(255,209,41,.08);color:var(--yellow);font-size:.72rem;font-weight:950;text-decoration:none;white-space:nowrap}
  .sec-quick:hover{background:var(--yellow);color:var(--yellow-ink)}
  .profile-tags{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin:10px 0 2px}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border:1px solid var(--line-soft);
    border-radius:999px;background:var(--bg-soft);color:var(--muted);font-size:.7rem}
  .chip.hot{color:var(--yellow)}
  .chip.category{border-color:rgba(99,179,255,.26);color:var(--blue)}

  .trending{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .trend-card{display:flex;flex-direction:column;min-height:166px;padding:15px;border:1px solid var(--line);
    border-radius:16px;background:linear-gradient(145deg,rgba(27,32,48,.96),rgba(17,20,31,.96));
    text-decoration:none;transition:transform .18s var(--ease),border-color .18s ease}
  .trend-card:hover{transform:translateY(-2px);border-color:var(--blue)}
  .trend-rank{color:var(--yellow);font-size:.73rem;font-weight:950;letter-spacing:.08em}
  .trend-title{margin-top:10px;font-weight:850;line-height:1.35}
  .trend-meta{margin-top:auto;padding-top:12px;color:var(--muted);font-size:.75rem}

  .panel{margin-top:30px;padding:21px;border:1px solid var(--line);border-radius:var(--radius);
    background:linear-gradient(135deg,rgba(255,209,41,.055),rgba(185,134,255,.055))}
  .panel h2{margin:0;font-size:1.18rem}
  .panel-intro{margin:5px 0 17px;color:var(--muted);font-size:.88rem}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .field{min-width:0}
  .field.full{grid-column:1/-1}
  .field label{display:block;margin:0 0 6px;color:var(--text);font-size:.8rem;font-weight:850}
  .field .optional{color:var(--muted);font-weight:600}
  .field input,.field textarea,.filter-input{
    width:100%;min-height:46px;padding:11px 12px;border:1px solid var(--line);border-radius:11px;
    background:var(--bg-soft);color:var(--text);outline:0}
  .field textarea{min-height:92px;resize:vertical}
  .field input:focus,.field textarea:focus,.filter-input:focus{border-color:var(--blue);box-shadow:var(--focus)}
  .helper{display:block;margin-top:5px;color:var(--muted);font-size:.73rem}
  .form-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:14px}
  .secondary-btn{min-height:44px;padding:9px 15px;border:1px solid var(--line);border-radius:11px;
    background:var(--surface-2);color:var(--text);font-weight:850}
  .secondary-btn:hover{border-color:var(--blue)}
  .button-icon{display:inline-flex;align-items:center;gap:7px}
  .button-icon svg{width:18px;height:18px}
  button:disabled{opacity:.52;cursor:not-allowed}
  .form-status{min-height:23px;margin-top:10px;font-size:.82rem;font-weight:750}
  .form-status.ok{color:var(--green)}
  .form-status.err{color:var(--red)}
  .hp{position:absolute!important;left:-10000px!important;width:1px!important;height:1px!important;overflow:hidden!important}

  .claim-bar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin:23px 0 0;padding:14px 16px;
    border:1px solid rgba(255,209,41,.28);border-radius:15px;background:rgba(255,209,41,.05)}
  .claim-copy b{display:block}
  .claim-copy span{display:block;color:var(--muted);font-size:.8rem}

  .suggest-cta{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:18px;margin:14px 0 0;
    padding:18px 19px;border:1px solid rgba(99,179,255,.4);border-radius:18px;
    background:linear-gradient(120deg,rgba(99,179,255,.1),rgba(185,134,255,.08));box-shadow:0 12px 38px rgba(0,0,0,.18)}
  .suggest-cta h2{margin:0;font-size:1.12rem}
  .suggest-cta p{margin:3px 0 0;color:var(--muted);font-size:.82rem}
  .suggest-open{min-width:190px}
  .profile-share{display:inline-flex;align-items:center;min-height:44px;margin-top:6px;padding:8px 2px;border:0;
    background:transparent;color:var(--blue);font-size:.82rem;font-weight:850;text-align:left}
  .profile-share:hover{text-decoration:underline}
  .profile-share svg{width:17px;height:17px}

  .profile-tools{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:end;gap:12px;margin:24px 0 12px}
  .filter-wrap{position:relative}
  .filter-wrap svg{position:absolute;left:12px;top:50%;width:18px;height:18px;transform:translateY(-50%);color:var(--muted)}
  .filter-input{padding-left:39px}
  .tabs{display:flex;gap:6px;padding:5px;border:1px solid var(--line);border-radius:13px;background:var(--bg-soft)}
  .tab{min-height:42px;padding:8px 12px;border:0;border-radius:9px;background:transparent;color:var(--muted);
    font-size:.82rem;font-weight:850;white-space:nowrap}
  .tab:hover{color:var(--text)}
  .tab.active{background:var(--surface-2);color:var(--text);box-shadow:0 5px 18px rgba(0,0,0,.22)}

  .podium{display:grid;grid-template-columns:1fr 1.12fr 1fr;align-items:end;gap:9px;margin:18px 0 16px}
  .podium-card{position:relative;min-width:0;padding:15px 12px;border:1px solid var(--line);border-radius:15px 15px 10px 10px;
    background:linear-gradient(160deg,var(--surface-2),var(--surface));text-align:center;cursor:pointer;
    transition:transform .2s var(--ease),border-color .2s ease}
  .podium-card:hover{transform:translateY(-3px)}
  .podium-card.first{min-height:142px;border-color:rgba(255,215,0,.6);box-shadow:0 0 34px rgba(255,215,0,.1)}
  .podium-card.second{min-height:122px;border-color:rgba(203,211,227,.42)}
  .podium-card.third{min-height:110px;border-color:rgba(223,159,105,.42)}
  .podium-medal{font-size:1.4rem;font-weight:950}
  .first .podium-medal{color:var(--gold)}.second .podium-medal{color:var(--silver)}.third .podium-medal{color:var(--bronze)}
  .podium-title{margin-top:7px;font-size:.78rem;font-weight:800;line-height:1.3;display:-webkit-box;
    -webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .podium-score{margin-top:7px;color:var(--muted);font-size:.7rem}

  .list{display:flex;flex-direction:column;gap:11px}
  .idea-card{display:grid;grid-template-columns:42px minmax(0,1fr) auto;gap:13px;align-items:center;
    padding:15px;border:1px solid var(--line);border-radius:16px;background:var(--surface);
    transition:transform .18s var(--ease),border-color .18s ease,box-shadow .18s ease}
  .idea-card:hover{transform:translateY(-1px);border-color:#44506d;box-shadow:0 9px 30px rgba(0,0,0,.22)}
  .idea-card.top1{border-color:rgba(255,215,0,.48)}.idea-card.top2{border-color:rgba(203,211,227,.37)}
  .idea-card.top3{border-color:rgba(223,159,105,.37)}
  .idea-card.team-pick{border-color:rgba(255,215,0,.75);background:linear-gradient(135deg,rgba(255,215,0,.055),var(--surface))}
  .idea-card.deep-focus{animation:deepPulse 1.1s var(--ease) 2}
  @keyframes deepPulse{50%{box-shadow:0 0 0 4px rgba(99,179,255,.28),0 12px 40px rgba(0,0,0,.3);border-color:var(--blue)}}
  .rank{font-size:1.25rem;font-weight:950;text-align:center;color:var(--muted);font-variant-numeric:tabular-nums}
  .top1 .rank{color:var(--gold)}.top2 .rank{color:var(--silver)}.top3 .rank{color:var(--bronze)}
  .idea-main{min-width:0}
  .team-badge{display:inline-flex;align-items:center;gap:5px;margin-bottom:7px;padding:3px 9px;
    border:1px solid rgba(255,215,0,.42);border-radius:999px;background:rgba(255,215,0,.12);
    color:var(--gold);font-size:.68rem;font-weight:950;letter-spacing:.04em}
  .team-badge svg{width:14px;height:14px}
  .idea-title{font-weight:850;line-height:1.36}
  .score-row{display:flex;align-items:center;gap:8px;margin-top:9px}
  .score-track{flex:1;height:6px;border-radius:99px;background:var(--bg-soft);overflow:hidden}
  .score-fill{height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--purple));
    transition:width .65s var(--ease)}
  .team-pick .score-fill{background:linear-gradient(90deg,var(--gold),#ffad22)}
  .score-label{min-width:54px;text-align:right;color:var(--blue);font-size:.76rem;font-weight:900}
  .team-pick .score-label{color:var(--gold)}
  .reason{margin-top:6px;color:var(--muted);font-size:.79rem;font-style:italic}
  .idea-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:9px}
  .source-link{color:var(--blue);text-decoration:none}
  .source-link:hover{text-decoration:underline}
  .idea-actions{display:flex;align-items:center;gap:8px}
  .vote-btn,.icon-btn{min-width:48px;min-height:48px;border:1px solid var(--line);border-radius:12px;
    background:var(--bg-soft);color:var(--text);font-weight:900}
  .vote-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 10px}
  .vote-btn:hover{border-color:var(--green);color:var(--green)}
  .vote-btn.voted{border-color:var(--green);background:rgba(85,229,154,.1);color:var(--green)}
  .vote-count{font-size:.98rem;font-variant-numeric:tabular-nums}
  .vote-label{color:var(--muted);font-size:.57rem;letter-spacing:.07em}
  .icon-btn{display:grid;place-items:center;padding:0;color:var(--muted)}
  .icon-btn:hover{border-color:var(--blue);color:var(--blue)}
  .icon-btn svg{width:19px;height:19px}
  .empty-state{padding:36px 18px;border:1px dashed var(--line);border-radius:16px;color:var(--muted);text-align:center}
  .loading{padding:42px 10px;color:var(--muted);text-align:center}
  .spinner{display:inline-block;width:22px;height:22px;margin-bottom:9px;border:3px solid var(--line);
    border-top-color:var(--yellow);border-radius:50%;animation:spin .85s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .toast{position:fixed;left:50%;bottom:22px;z-index:50;width:min(440px,calc(100% - 28px));padding:13px 16px;
    border:1px solid var(--line);border-radius:13px;background:#171c29;color:var(--text);
    box-shadow:var(--shadow);transform:translate(-50%,120px);opacity:0;pointer-events:none;
    transition:transform .25s var(--ease),opacity .2s ease}
  .toast.show{transform:translate(-50%,0);opacity:1}
  .toast.ok{border-color:rgba(85,229,154,.55)}.toast.err{border-color:rgba(255,113,140,.6)}
  footer{margin-top:38px;padding-top:20px;border-top:1px solid var(--line-soft);color:var(--muted);
    text-align:center;font-size:.78rem;line-height:1.7}
  footer b{color:var(--text)}
  .privacy-note{margin-top:9px;color:var(--muted);font-size:.72rem}
  .retry-btn{margin-top:12px}

  dialog{padding:0;border:0;background:transparent;color:var(--text)}
  dialog::backdrop{background:rgba(3,5,10,.78);backdrop-filter:blur(5px)}
  .dialog-card{position:relative;width:min(640px,calc(100vw - 24px));max-height:min(88dvh,850px);overflow:auto;
    padding:24px;border:1px solid var(--line);border-radius:22px;background:#151925;box-shadow:0 28px 90px rgba(0,0,0,.62)}
  .dialog-card.wide{width:min(720px,calc(100vw - 24px))}
  .dialog-card h2{margin:0;padding-right:46px;font-size:1.35rem}
  .dialog-close{position:absolute;top:14px;right:14px;display:grid;place-items:center;width:44px;height:44px;
    border:1px solid var(--line);border-radius:12px;background:var(--bg-soft);color:var(--muted);font-size:1.25rem}
  .dialog-close:hover{border-color:var(--blue);color:var(--text)}
  .dialog-intro{margin:5px 42px 18px 0;color:var(--muted);font-size:.86rem}
  .privacy-box{margin-top:12px;padding:13px;border:1px solid var(--line-soft);border-radius:13px;background:var(--bg-soft)}
  .privacy-title{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:.82rem;font-weight:900}
  .privacy-title .private-badge{padding:3px 8px;border-radius:999px;background:rgba(85,229,154,.1);color:var(--green);font-size:.68rem}
  .choice-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px}
  .choice-row:has(.choice.hidden){grid-template-columns:1fr}
  .choice{display:flex;align-items:flex-start;gap:9px;padding:11px;border:1px solid var(--line);border-radius:11px;color:var(--muted);font-size:.78rem}
  .choice:has(input:checked){border-color:var(--blue);background:rgba(99,179,255,.08);color:var(--text)}
  .choice input{margin:3px 0 0;accent-color:var(--blue)}
  .choice b{display:block;color:var(--text)}
  .check-row{display:flex;align-items:flex-start;gap:9px;margin-top:8px;color:var(--muted);font-size:.76rem}
  .check-row input{width:18px;height:18px;flex:0 0 auto;margin:1px 0 0;accent-color:var(--green)}
  .similar-wrap{margin:12px 0;padding:13px;border:1px solid rgba(85,229,154,.32);border-radius:13px;background:rgba(85,229,154,.045)}
  .similar-head{font-size:.78rem;font-weight:900;color:var(--green)}
  .similar-list{display:flex;flex-direction:column;gap:7px;margin-top:9px}
  .similar-item{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:10px;padding:10px;
    border:1px solid var(--line-soft);border-radius:11px;background:var(--surface)}
  .similar-item b{display:block;font-size:.8rem;line-height:1.35}
  .similar-item span{color:var(--muted);font-size:.69rem}
  .similar-vote{min-width:84px;min-height:44px;padding:7px 10px;border:1px solid var(--green);border-radius:10px;
    background:rgba(85,229,154,.08);color:var(--green);font-size:.72rem;font-weight:900}
  .auth-nudge{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px;padding:11px 12px;
    border:1px dashed var(--line);border-radius:12px;color:var(--muted);font-size:.76rem}
  .auth-nudge button{flex:0 0 auto}
  .receipt{margin-top:12px;padding:12px;border:1px solid rgba(85,229,154,.35);border-radius:12px;
    background:rgba(85,229,154,.06);color:var(--green);font-size:.8rem}
  .activity-user{margin:8px 0 15px;color:var(--muted);font-size:.8rem;word-break:break-word}
  .activity-list{display:flex;flex-direction:column;gap:8px}
  .activity-item{padding:12px;border:1px solid var(--line-soft);border-radius:12px;background:var(--bg-soft)}
  .activity-item b{display:block;font-size:.85rem}
  .activity-meta{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px;color:var(--muted);font-size:.7rem}
  .status-pill{padding:3px 8px;border-radius:999px;background:var(--surface-2);color:var(--blue);font-weight:850}
  .status-pill.pending,.status-pill.received{color:var(--yellow)}
  .status-pill.verified,.status-pill.published{color:var(--green)}
  .team-interest-btn{color:var(--muted)}
  .team-interest-btn[aria-pressed="true"]{border-color:var(--gold);background:rgba(255,215,0,.1);color:var(--gold)}
  .signal-strip{display:flex;align-items:center;justify-content:center;gap:7px;flex-wrap:wrap;margin:11px 0 0;color:var(--muted);font-size:.7rem}
  .signal-strip span{padding:5px 9px;border:1px solid var(--line-soft);border-radius:999px;background:rgba(21,25,38,.72)}
  .signal-strip b{color:var(--text)}
  .team-tools{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:12px 0;padding:12px;
    border:1px solid rgba(255,215,0,.25);border-radius:13px;background:rgba(255,215,0,.045)}
  .team-tools b{display:block}.team-tools span{display:block;color:var(--muted);font-size:.74rem}
  .team-list{display:flex;flex-direction:column;gap:8px;margin-top:15px}
  .team-member{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:10px;padding:11px;
    border:1px solid var(--line-soft);border-radius:12px;background:var(--bg-soft)}
  .team-member b{display:block;font-size:.82rem;word-break:break-word}
  .team-member span{color:var(--muted);font-size:.7rem}
  .invite-result{margin-top:12px;padding:12px;border:1px solid rgba(85,229,154,.35);border-radius:12px;background:rgba(85,229,154,.055)}
  .invite-link-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;margin-top:8px}
  .invite-link-row input{min-width:0;width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:10px;background:var(--bg);color:var(--muted)}
  .inline-select{width:100%;min-height:46px;padding:10px 12px;border:1px solid var(--line);border-radius:11px;background:var(--bg-soft);color:var(--text)}
  .inline-link{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:9px 14px;border:1px solid var(--line);
    border-radius:11px;background:var(--surface-2);color:var(--text);font-weight:850;text-decoration:none}
  .mobile-suggest{display:none}

  @media (max-width:760px){
    .wrap{padding-top:18px}
    .how{grid-template-columns:1fr}
    .sections{grid-template-columns:repeat(2,minmax(0,1fr))}
    .trending{grid-template-columns:1fr}
    .trend-card{min-height:120px}
    .profile-tools{grid-template-columns:1fr}
    .tabs{overflow-x:auto}
    .tab{flex:1}
    .suggest-cta{grid-template-columns:1fr}
    .suggest-open{width:100%}
  }
  @media (max-width:560px){
    .wrap{padding:18px 13px 132px}
    .top-actions{left:10px;right:10px;justify-content:flex-end}
    .top-btn{padding-inline:12px}
    header{padding-top:45px}
    .brand-lockup{padding-right:34px}
    .logo{font-size:clamp(2.45rem,14vw,3.25rem)}
    .eyebrow{right:-2px;top:1px;padding:4px 8px}
    .search-shell{grid-template-columns:21px minmax(0,1fr) auto;gap:7px;padding:6px 7px 6px 13px}
    .search-btn{padding-inline:12px}
    .directory-block{margin-inline:-2px;padding:13px;border-radius:19px}
    .directory-block .section-head{align-items:flex-start}
    .sections{grid-template-columns:1fr}
    .sec-card{min-height:158px}
    .form-grid{grid-template-columns:1fr}
    .field.full{grid-column:auto}
    .claim-bar{align-items:flex-start;flex-direction:column}
    .podium{gap:6px}
    .podium-card{padding:11px 7px}
    .podium-card.first{min-height:135px}.podium-card.second{min-height:116px}.podium-card.third{min-height:105px}
    .idea-card{grid-template-columns:30px minmax(0,1fr);gap:10px;padding:13px}
    .idea-actions{grid-column:2;justify-content:flex-end}
    .rank{font-size:1.05rem}
    .reason{font-size:.76rem}
    .stats{gap:6px;flex-wrap:nowrap}.stat{min-width:0;flex:1 1 0;padding-inline:5px}.stat .l{font-size:.58rem}
    .choice-row{grid-template-columns:1fr}
    .dialog-card{width:100vw;max-height:92dvh;border-radius:20px 20px 0 0;padding:20px 15px 24px}
    dialog{margin:auto 0 0;width:100%;max-width:none}
    .mobile-suggest{position:fixed;display:none;left:12px;right:12px;bottom:max(12px,env(safe-area-inset-bottom));z-index:28;
      min-height:54px;border:0;border-radius:15px;background:linear-gradient(100deg,var(--yellow),#ffb91f);
      color:var(--yellow-ink);font-weight:950;box-shadow:0 14px 42px rgba(0,0,0,.5)}
    body.profile-live .mobile-suggest{display:block}
  }
  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto}
    *,*:before,*:after{animation:none!important;transition:none!important}
    .logo:hover,.logo:focus-visible{filter:drop-shadow(0 0 12px rgba(99,179,255,.4))}
  }
</style>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>
<div class="bgfx"></div>
<div class="gridfx"></div>
<div class="top-actions">
  <button class="top-btn" id="account-btn" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="12" cy="8" r="4"></circle><path d="M4.8 21a7.2 7.2 0 0 1 14.4 0"></path>
    </svg>
    <span id="account-btn-text">Sign in</span>
  </button>
  <button class="top-btn" id="lang-btn" type="button">ES</button>
</div>

<main class="wrap" id="main">
  <header>
    <div class="brand-lockup">
      <a class="logo" id="logo" href="./" aria-label="FanRank">
        <span>FAN</span><span class="logo-rank">RANK</span><span class="logo-star" aria-hidden="true">✦</span>
      </a>
      <span class="eyebrow" id="eyebrow"></span>
    </div>
    <div class="tag" id="hero-tag"></div>

    <form class="search-area" id="search-form" role="search" novalidate>
      <label class="field-label" id="search-label" for="global-search"></label>
      <div class="search-shell">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.2-3.2"></path>
        </svg>
        <input id="global-search" maxlength="120" autocomplete="off" enterkeyhint="search">
        <button class="search-btn" id="search-btn" type="submit"></button>
      </div>
      <div class="search-panel hidden" id="search-panel" aria-live="polite"></div>
    </form>

    <div class="crumb" id="crumb"><span class="dot"></span><span id="crumb-text"></span></div>
  </header>

  <div class="stats" id="stats"></div>

  <section id="home-view">
    <section class="directory-block" aria-labelledby="profiles-title">
      <div class="section-head">
        <div><h2 id="profiles-title"></h2><p id="profiles-subtitle"></p></div>
        <span class="directory-count" id="directory-count" aria-live="polite"></span>
      </div>
      <div class="filter-rail" id="directory-filters" role="toolbar" aria-label="Profile filters"></div>
      <div class="sections" id="sections">
        <div class="loading"><span class="spinner"></span><div id="loading-text"></div></div>
      </div>
    </section>

    <div class="section-head">
      <div><h2 id="trending-title"></h2><p id="trending-subtitle"></p></div>
    </div>
    <div class="trending" id="trending"></div>

    <div class="how" id="how"></div>

    <section class="panel" id="request-panel">
      <h2 id="request-title"></h2>
      <p class="panel-intro" id="request-intro"></p>
      <form id="request-form" novalidate>
        <div class="form-grid">
          <div class="field full">
            <label id="request-target-label" for="request-target"></label>
            <input id="request-target" maxlength="120" autocomplete="off" required>
          </div>
          <div class="field">
            <label id="request-name-label" for="request-name"></label>
            <input id="request-name" maxlength="80" autocomplete="name">
          </div>
          <div class="field">
            <label id="request-contact-label" for="request-contact"></label>
            <input id="request-contact" maxlength="180" autocomplete="email">
            <span class="helper" id="request-contact-help"></span>
          </div>
        </div>
        <label class="check-row">
          <input id="request-allow-contact" type="checkbox">
          <span id="request-consent-copy"></span>
        </label>
        <input class="hp" id="request-website" tabindex="-1" autocomplete="off" aria-hidden="true">
        <div class="form-actions">
          <button class="primary-btn" id="request-send" type="submit"></button>
        </div>
        <div class="form-status" id="request-status" role="status" aria-live="polite"></div>
      </form>
    </section>
  </section>

  <section class="hidden" id="section-view">
    <div class="profile-tags" id="profile-tags"></div>

    <section class="suggest-cta" aria-labelledby="suggest-cta-title">
      <div>
        <h2 id="suggest-cta-title"></h2>
        <p id="suggest-cta-copy"></p>
        <button class="profile-share button-icon" id="profile-share" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M12 3v12"></path><path d="m7 8 5-5 5 5"></path><path d="M5 13v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6"></path>
          </svg>
          <span id="profile-share-text"></span>
        </button>
      </div>
      <button class="primary-btn suggest-open" id="suggest-open" type="button"></button>
    </section>

    <div class="claim-bar">
      <div class="claim-copy"><b id="claim-bar-title"></b><span id="claim-bar-copy"></span></div>
      <button class="secondary-btn button-icon" id="claim-open" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M12 3 4.5 6v5.4c0 4.7 3.2 8.4 7.5 9.6 4.3-1.2 7.5-4.9 7.5-9.6V6L12 3Z"></path>
          <path d="m9 12 2 2 4-4"></path>
        </svg>
        <span id="claim-open-text"></span>
      </button>
    </div>
    <div class="signal-strip" id="signal-strip" aria-label="Ranking signals">
      <span id="signal-ai"></span><span id="signal-fans"></span><span id="signal-team"></span>
    </div>

    <div class="profile-tools">
      <div>
        <label class="field-label" id="filter-label" for="idea-filter"></label>
        <div class="filter-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.2-3.2"></path>
          </svg>
          <input class="filter-input" id="idea-filter" maxlength="120" autocomplete="off">
        </div>
      </div>
      <div class="tabs" role="tablist" aria-label="Ranking">
        <button class="tab active" data-sort="ai" id="tab-ai" type="button" role="tab" aria-selected="true"></button>
        <button class="tab" data-sort="source" id="tab-source" type="button" role="tab" aria-selected="false"></button>
        <button class="tab" data-sort="fans" id="tab-fans" type="button" role="tab" aria-selected="false"></button>
      </div>
    </div>

    <div class="podium" id="podium" aria-label="Top three ideas"></div>
    <div class="list" id="ideas-list"></div>

    <section class="panel hidden" id="claim-panel">
      <h2 id="claim-title"></h2>
      <p class="panel-intro" id="claim-intro"></p>
      <form id="claim-form" novalidate>
        <div class="form-grid">
          <div class="field">
            <label id="claim-name-label" for="claim-name"></label>
            <input id="claim-name" maxlength="100" autocomplete="name" required>
          </div>
          <div class="field">
            <label id="claim-role-label" for="claim-role"></label>
            <input id="claim-role" maxlength="120" required>
          </div>
          <div class="field">
            <label id="claim-contact-label" for="claim-contact"></label>
            <input id="claim-contact" maxlength="180" autocomplete="email" required>
          </div>
          <div class="field">
            <label id="claim-proof-label" for="claim-proof"></label>
            <input id="claim-proof" type="url" maxlength="500" inputmode="url">
          </div>
          <div class="field full">
            <label id="claim-message-label" for="claim-message"></label>
            <textarea id="claim-message" maxlength="1000"></textarea>
          </div>
        </div>
        <input class="hp" id="claim-website" tabindex="-1" autocomplete="off" aria-hidden="true">
        <div class="form-actions">
          <button class="primary-btn" id="claim-send" type="submit"></button>
          <button class="secondary-btn" id="claim-cancel" type="button"></button>
        </div>
        <div class="form-status" id="claim-status" role="status" aria-live="polite"></div>
      </form>
    </section>
  </section>

  <footer id="footer"></footer>
</main>

<button class="mobile-suggest" id="mobile-suggest" type="button"></button>

<dialog id="suggest-dialog" aria-labelledby="submit-title">
  <div class="dialog-card wide">
    <button class="dialog-close" id="suggest-close" type="button" aria-label="Close">×</button>
    <h2 id="submit-title"></h2>
    <p class="dialog-intro" id="submit-intro"></p>
    <form id="submit-form" novalidate>
      <div class="form-grid">
        <div class="field full">
          <label id="submit-idea-label" for="submit-idea"></label>
          <input id="submit-idea" maxlength="140" autocomplete="off" required>
        </div>
      </div>
      <section class="similar-wrap hidden" id="similar-wrap" aria-live="polite">
        <div class="similar-head" id="similar-head"></div>
        <div class="similar-list" id="similar-ideas"></div>
        <span class="helper" id="similar-help"></span>
      </section>
      <div class="form-grid">
        <div class="field full">
          <label id="submit-details-label" for="submit-details"></label>
          <textarea id="submit-details" maxlength="1000"></textarea>
        </div>

  var opts = options || {};
  var authHeaders = session && session.access_token ? {"Authorization":"Bearer " + session.access_token} : {};
  opts.headers = Object.assign({},API_HEADERS,authHeaders,opts.headers || {});
  var response = await fetch(SB_URL + "/rest/v1/" + path,opts);

  }

function armCelestialAudio(){
  if(REDUCED || audioArmed){return;}
  var Context = window.AudioContext || window.webkitAudioContext;
  if(!Context){return;}
  try{
    audioContext = audioContext || new Context();
    audioContext.resume().then(function(){audioArmed = audioContext.state === "running";}).catch(function(){});
  }catch(error){}
}
function playCelestialChime(){
  if(REDUCED || !audioArmed || !audioContext || chimePlayed){return;}
  chimePlayed = true;
  setTimeout(function(){chimePlayed = false;},9000);
  [523.25,659.25,783.99,1046.5].forEach(function(frequency,index){
    var oscillator = audioContext.createOscillator();
    var gain = audioContext.createGain();
    oscillator.type = index === 1 ? "triangle" : "sine";
    oscillator.frequency.setValueAtTime(frequency,audioContext.currentTime);
    gain.gain.setValueAtTime(.0001,audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(index === 3 ? .018 : .026,audioContext.currentTime + .035 + index*.015);
    gain.gain.exponentialRampToValueAtTime(.0001,audioContext.currentTime + .52 + index*.04);
    oscillator.connect(gain).connect(audioContext.destination);
    oscillator.start();
    oscillator.stop(audioContext.currentTime + .62);
  });
}

    "&idea=" + encodeURIComponent(item.id) + (LANG === "es" ? "&lang=es" : "");
}
var REFERRAL_SOURCES = {fan_share:true,idea_share:true,reddit:true,discord:true,x:true,whatsapp:true};
function referralSource(){
  var source = (new URLSearchParams(location.search).get("ref") || "").trim().toLowerCase();
  return REFERRAL_SOURCES[source] ? source : null;
}
function withReferral(url,source){
  var target = new URL(url,location.origin);
  target.searchParams.set("ref",source);
  return target.toString();
}
function profileShareUrl(){
  return withReferral(location.origin + sectionUrl(SECTION),"fan_share");
}

async function loadDirectory(){
  var result = await Promise.all([
    api("fr_sections_stats?select=*"),
    api("fr_ranking?select=*&limit=500")
  ]);
  sections = Array.isArray(result[0]) ? result[0] : [];
  allIdeas = Array.isArray(result[1]) ? result[1] : [];
  sections.sort(function(a,b){return Number(a.featured_rank||9999)-Number(b.featured_rank||9999);});
}

function directoryScore(item,mode){
  if(mode === "trending"){
    return Number(item.recent_ideas||0)*20 + Number(item.fan_votes||0)*18 + Number(item.reddit_upvotes||0)*.02;
  }
  if(mode === "popular"){
    return Number(item.reddit_upvotes||0) + Number(item.fan_votes||0)*25 + Number(item.ideas||0);
  }
  if(mode === "active"){
    return Number(item.ideas||0)*10 + Number(item.fan_votes||0)*15 + Number(item.recent_ideas||0)*5;
  }
  return 10000-Number(item.featured_rank||9999);
}
function directoryItems(){
  var list = sections.slice();
  if(directoryMode === "creators-es"){
    list = list.filter(function(item){return item.kind === "creator" && sectionTags(item).indexOf("spain") >= 0;});
  }else if(directoryMode === "games"){
    list = list.filter(function(item){return item.kind === "game";});
  }else if(directoryMode === "social"){
    list = list.filter(function(item){return item.kind === "social";});
  }else if(directoryMode === "ai"){
    list = list.filter(function(item){return item.kind === "ai";});
  }
  list.sort(function(a,b){
    return directoryScore(b,directoryMode)-directoryScore(a,directoryMode) ||
      Number(a.featured_rank||9999)-Number(b.featured_rank||9999);
  });
  return list;
}

function normalize(value){
  return String(value || "").toLocaleLowerCase(LANG === "es" ? "es" : "en")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}
function keywordTokens(value){
  var stop = {the:1,and:1,for:1,with:1,from:1,that:1,this:1,una:1,uno:1,los:1,las:1,para:1,con:1,que:1,del:1,por:1};
  return normalize(value).split(/[^a-z0-9]+/).filter(function(token){return token.length >= 3 && !stop[token];});
}
function similarIdeas(query){
  var clean = normalize(query);
  if(clean.length < 8){return [];}
  var queryTokens = keywordTokens(clean);
  return ideas.map(function(item){
    var haystack = normalize((item.title || "") + " " + (item.title_es || ""));
    var tokens = keywordTokens(haystack);
    var overlap = queryTokens.filter(function(token){return tokens.indexOf(token) >= 0;}).length;
    var score = queryTokens.length ? overlap / queryTokens.length : 0;
    if(clean.length >= 12 && (haystack.indexOf(clean) >= 0 || clean.indexOf(haystack) >= 0)){score += .75;}
    return {item:item,score:score};
  }).filter(function(entry){return entry.score >= .34;})
    .sort(function(a,b){return b.score-a.score || Number(b.item.web_votes)-Number(a.item.web_votes);})
    .slice(0,3).map(function(entry){return entry.item;});
}

function searchMatches(query){
  var needle = normalize(query);
  var sectionMatches = sections.filter(function(item){
    var labels = sectionTags(item).map(tagLabel).join(" ");
    return normalize(item.name + " " + sectionTagline(item) + " " + item.kind + " " + kindLabel(item.kind) + " " + labels).indexOf(needle) >= 0;
  }).slice(0,4);
  var ideaMatches = allIdeas.filter(function(item){
    return normalize(ideaTitle(item) + " " + ideaReason(item)).indexOf(needle) >= 0;
  }).slice(0,5);
  return {sections:sectionMatches,ideas:ideaMatches};
}

function requestFromSearch(query){
  sendEvent("search",{value:query});
  byId("search-panel").classList.add("hidden");
  if(SECTION){
    location.href = location.pathname + (LANG === "es" ? "?lang=es" : "") + "#request-panel";
    return;
  }
  byId("request-target").value = query.trim();
  byId("request-panel").scrollIntoView({behavior:REDUCED ? "auto" : "smooth",block:"center"});
  setTimeout(function(){byId("request-target").focus();},REDUCED ? 0 : 350);
}

function rankScore(item){
  return Number(item.ai_score || 0) + Math.min(Number(item.web_votes || 0) * 2,20) +
    Math.min(Number(item.team_interest_count || 0) * 5,15);
}
function sortedIdeas(source){
  var list = (source || ideas).slice();
  if(sortMode === "ai"){
    list.sort(function(a,b){
      return rankScore(b)-rankScore(a) || Number(b.ai_score)-Number(a.ai_score) ||
        Number(b.web_votes)-Number(a.web_votes) || Number(b.origin_upvotes)-Number(a.origin_upvotes);
    });
  }else if(sortMode === "source"){
    list.sort(function(a,b){return Number(b.origin_upvotes)-Number(a.origin_upvotes) || Number(b.ai_score)-Number(a.ai_score);});
  }else{
    list.sort(function(a,b){return Number(b.web_votes)-Number(a.web_votes) || Number(b.ai_score)-Number(a.ai_score);});
  }
  return list;
}
function fanPosition(id){
  var fanList = ideas.slice().sort(function(a,b){
    return Number(b.web_votes)-Number(a.web_votes) || Number(b.ai_score)-Number(a.ai_score);
  });
  return fanList.findIndex(function(item){return item.id === id;}) + 1;
}

      (hasTeamInterest ? '<div class="team-badge">' + icon("heart") + esc(tx("team_pick",Number(item.team_interest_count || 0))) + '</div>' : "") +
      '<div class="idea-title">' + esc(ideaTitle(item)) + '</div><div class="score-row"><div class="score-track">' +
      '<div class="score-fill" data-score="' + score + '"></div></div><div class="score-label">' +
      esc(tx("ai_score")) + " " + score + '</div></div>' +
      '<div class="reason">' + esc(ideaReason(item)) + '</div><div class="idea-meta">' +
      '<span class="chip">' + fmt(item.origin_upvotes) + ' ' + esc(tx("source_votes")) + '</span>' +
      (source ? '<a class="chip source-link" href="' + esc(source) + '" target="_blank" rel="noopener noreferrer">' +
      esc(tx("source")) + ' ↗</a>' : "") + '</div></div><div class="idea-actions">' +
      '<button class="icon-btn" type="button" data-share="' + item.id + '" aria-label="' + esc(tx("share")) +
      '" title="' + esc(tx("share")) + '">' + icon("share") + '</button>' +
      '<button class="vote-btn ' + (voted ? "voted" : "") + '" type="button" data-vote="' + item.id + '" ' +
      (voted ? "disabled" : "") + '><span class="vote-count">' + Number(item.web_votes||0) +
      '</span><span class="vote-label">' + esc(voted ? tx("voted") : tx("vote")) + '</span></button>' +
      (session && membership && secMeta && secMeta.verification_status === "verified" ?
        '<button class="icon-btn team-interest-btn" type="button" data-interest="' + item.id + '" aria-pressed="' +
        (myTeamInterestIds.has(item.id) ? "true" : "false") + '" aria-label="' + esc(myTeamInterestIds.has(item.id) ? tx("team_interest_remove") : tx("team_interest_add")) +
        '" title="' + esc(myTeamInterestIds.has(item.id) ? tx("team_interest_remove") : tx("team_interest_add")) + '">' + icon("heart") + '</button>' : "") +
      '</div></article>';
  }).join("");
  requestAnimationFrame(function(){
    document.querySelectorAll(".score-fill").forEach(function(fill){fill.style.width = fill.dataset.score + "%";});
  });
  document.querySelectorAll("[data-vote]").forEach(function(button){
    if(!button.disabled){button.addEventListener("click",function(){vote(Number(button.dataset.vote),button);});}
  });
  document.querySelectorAll("[data-share]").forEach(function(button){
    button.addEventListener("click",function(){shareIdea(Number(button.dataset.share));});
  });
  document.querySelectorAll("[data-interest]").forEach(function(button){
    button.addEventListener("click",function(){setTeamInterest(Number(button.dataset.interest),button);});
  });
}

function loadSection(){
  secMeta = sections.find(function(item){return item.slug === SECTION;}) || null;
  ideas = allIdeas.filter(function(item){return item.section === SECTION;});
  if(!secMeta){
    location.replace(location.pathname + (LANG === "es" ? "?lang=es" : ""));
    return;
  }
  document.title = "FanRank — " + secMeta.name;
  byId("hero-tag").innerHTML = tx("hero_section",esc(secMeta.name));
  byId("crumb-text").innerHTML = '<a href="' + esc(location.pathname + (LANG === "es" ? "?lang=es" : "")) + '">' +
    esc(tx("all_profiles")) + '</a> <span aria-hidden="true">›</span> ' + esc(secMeta.name);

  byId("section-view").classList.remove("hidden");
  document.body.classList.remove("home-live");
  document.body.classList.add("profile-live");
  renderProfile();
  focusDeepIdea();
  sendEvent("profile_open",{section:SECTION,value:"page_load"});
  if(QUICK_SUGGEST){

    var cleanUrl = new URL(location.href);
    cleanUrl.searchParams.delete("suggest");
    history.replaceState(null,"",cleanUrl.pathname + cleanUrl.search + cleanUrl.hash);
    setTimeout(openSuggestion,0);

async function vote(id,button){
  setBusy(button,true);
  try{
    var voteBody = session ? {idea_id:id,voter:"user:" + session.user.id,user_id:session.user.id} :
      {idea_id:id,voter:visitorId(),user_id:null};
    await postRow("fr_votes",voteBody);
    markVoted(id);
    var item = ideas.find(function(row){return row.id === id;});
    if(item){item.web_votes = Number(item.web_votes||0)+1;}
    var globalItem = allIdeas.find(function(row){return row.id === id;});
    if(globalItem && globalItem !== item){globalItem.web_votes = Number(globalItem.web_votes||0)+1;}
    renderProfile();
    renderSimilarIdeas();
    sendEvent("vote",{section:SECTION,idea_id:id});
    showToast(tx("vote_rank",fanPosition(id)),"ok");
  }catch(error){
    if(error.status === 409){
      markVoted(id);
      renderProfile();
      renderSimilarIdeas();
      showToast(tx("already_voted"),"ok");
    }else{
      setBusy(button,false);
      showToast(tx("generic_error"),"err");
    }
  }
}
async function setTeamInterest(id,button){
  if(!session || !membership){return;}
  var active = button.getAttribute("aria-pressed") !== "true";
  setBusy(button,true);
  try{
    var result = await callRpc("fr_set_team_interest",{p_idea_id:id,p_active:active});
    var returned = Array.isArray(result) ? result[0] : result;
    if(active){myTeamInterestIds.add(id);}else{myTeamInterestIds.delete(id);}
    var item = ideas.find(function(row){return row.id === id;});
    if(item){
      item.team_interest_count = returned ? Number(returned.team_interest_count || 0) : Math.max(0,Number(item.team_interest_count || 0) + (active ? 1 : -1));
    }
    var globalItem = allIdeas.find(function(row){return row.id === id;});
    if(globalItem){
      globalItem.team_interest_count = item ? item.team_interest_count : Number(globalItem.team_interest_count || 0);
    }
    renderProfile();
    sendEvent("team_interest",{section:SECTION,idea_id:id,value:active ? "on" : "off"});
    showToast(active ? tx("team_interest_add") : tx("team_interest_remove"),"ok");
  }catch(error){
    setBusy(button,false);
    showToast(tx("generic_error"),"err");
  }
}
async function shareIdea(id){
  var item = ideas.find(function(row){return row.id === id;});
  if(!item){return;}
  var shareData = {title:"FanRank — " + secMeta.name,text:ideaTitle(item),url:withReferral(ideaUrl(item),"idea_share")};
  try{
    if(navigator.share){
      await navigator.share(shareData);
    }else if(navigator.clipboard){
      await navigator.clipboard.writeText(shareData.url);
    }else{
      window.prompt(tx("share"),shareData.url);
    }
    sendEvent("idea_share",{section:SECTION,idea_id:id});
    showToast(tx("shared"),"ok");
  }catch(error){
    if(error && error.name !== "AbortError"){showToast(tx("generic_error"),"err");}
  }
}
async function shareProfile(){
  if(!SECTION || !secMeta){return;}
  var shareData = {
    title:"FanRank — " + secMeta.name,
    text:tx("share_profile_message",secMeta.name),
    url:profileShareUrl()
  };
  try{
    if(navigator.share){
      await navigator.share(shareData);
    }else if(navigator.clipboard){
      await navigator.clipboard.writeText(shareData.url);
    }else{
      window.prompt(tx("share_profile"),shareData.url);
    }
    // The existing allowed share event distinguishes whole-profile shares by a null idea_id + this value.
    sendEvent("idea_share",{section:SECTION,value:"profile"});
    showToast(tx("profile_shared"),"ok");
  }catch(error){
    if(error && error.name !== "AbortError"){showToast(tx("generic_error"),"err");}
  }
}

    var result = await callRpc("fr_create_profile_invite",{
      p_section:SECTION,p_email:email,p_role:byId("team-role").value
    });
    var invite = Array.isArray(result) ? result[0] : result;
    if(!invite || !invite.invite_token){throw new Error("No token returned");}
    var link = teamInviteUrl(invite.invite_token);
    byId("invite-link").value = link;

      encodeURIComponent("FanRank team invitation") + "&body=" + encodeURIComponent(link);

    byId("team-email").value = "";
    sendEvent("team_invite_created",{section:SECTION});
  }catch(error){setStatus("team-status",tx("generic_error"),"err");}

byId("request-form").addEventListener("submit",async function(event){
  event.preventDefault();
  var target = byId("request-target").value.trim();
  if(target.length < 3){
    setStatus("request-status",tx("required_error"),"err");
    byId("request-target").focus();
    return;
  }
  if(!validTiming("request-website","fr_last_request",30000)){
    setStatus("request-status",tx("too_fast"),"err");
    return;
  }
  var requestContact = byId("request-contact").value.trim();
  var requestConsent = byId("request-allow-contact").checked;
  if(requestContact && !requestConsent){
    setStatus("request-status",tx("contact_consent_error"),"err");
    byId("request-allow-contact").focus();
    return;
  }
  var button = byId("request-send");
  setBusy(button,true);
  setStatus("request-status","","");
  try{
    var requestReceipt = randomReceipt();
    await postRow("fr_submissions",{
      section:"section-request",title:target,
      author:byId("request-name").value.trim() || null,
      contact:requestContact || null,
      language:LANG,
      user_id:session ? session.user.id : null,
      attribution_mode:session ? "account" : "anonymous",
      allow_contact:!!requestContact && requestConsent,
      receipt_hash:await hashReceipt(requestReceipt)
    });
    storeReceipt(requestReceipt,target);
    markWrite("fr_last_request");
    sendEvent("section_request",{value:target});
    setStatus("request-status",tx("request_ok"),"ok");
    byId("request-form").reset();
    formStartedAt = Date.now();
  }catch(error){
    setStatus("request-status",tx("generic_error"),"err");
  }finally{setBusy(button,false);}
});

byId("submit-form").addEventListener("submit",async function(event){

    byId("submit-allow-contact").focus();
    return;

  if(!validTiming("submit-website","fr_last_submission",30000)){
    setStatus("submit-status",tx("too_fast"),"err");
    return;
  }
  var button = byId("submit-send");
  setBusy(button,true);
  setStatus("submit-status","","");

    var receipt = randomReceipt();

byId("claim-form").addEventListener("submit",async function(event){
  event.preventDefault();
  if(!session){openAuth("claim");return;}
  var name = byId("claim-name").value.trim();
  var role = byId("claim-role").value.trim();
  var contact = byId("claim-contact").value.trim();
  if(name.length < 2 || role.length < 2 || contact.length < 3){
    setStatus("claim-status",tx("required_error"),"err");
    if(name.length < 2){byId("claim-name").focus();}
    else if(role.length < 2){byId("claim-role").focus();}
    else{byId("claim-contact").focus();}
    return;
  }
  if(!validTiming("claim-website","fr_last_claim",60000)){
    setStatus("claim-status",tx("too_fast"),"err");
    return;
  }
  var proof = byId("claim-proof").value.trim();
  if(proof && !safeUrl(proof)){
    setStatus("claim-status",tx("required_error"),"err");
    byId("claim-proof").focus();
    return;
  }
  var button = byId("claim-send");
  setBusy(button,true);
  setStatus("claim-status","","");
  try{
    await postRow("fr_claims",{
      section:SECTION,name:name,role:role,contact:contact,
      proof_url:proof || null,
      message:byId("claim-message").value.trim() || null,
      user_id:session.user.id
    });
    markWrite("fr_last_claim");
    sendEvent("claim_request",{section:SECTION});
    setStatus("claim-status",tx("claim_ok"),"ok");
    byId("claim-form").reset();
    formStartedAt = Date.now();
  }catch(error){
    setStatus("claim-status",tx("generic_error"),"err");
  }finally{setBusy(button,false);}
});

async function boot(){
  applyStaticText();
  byId("hero-tag").innerHTML = SECTION ? tx("loading") : tx("hero_home");
  byId("crumb-text").textContent = SECTION ? tx("loading") : tx("all_profiles");
  sendEvent("page_view",{section:SECTION || null,value:referralSource()});
  try{
    await initAuth();
    await loadDirectory();
    if(SECTION){loadSection();}else{loadHome();}
    resumeAfterAuth();
    await handlePendingInvite();
  }catch(error){
    byId("sections").innerHTML = '<div class="empty-state">' + esc(tx("generic_error")) +
      '<br><button class="secondary-btn retry-btn" type="button" onclick="location.reload()">' +
      esc(LANG === "es" ? "Reintentar" : "Retry") + '</button></div>';
    byId("hero-tag").textContent = tx("generic_error");
  }
}
boot();
