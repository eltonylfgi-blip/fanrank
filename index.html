<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0b12">
<title>FanRank — the best ideas, ranked</title>
<meta name="description" content="Starting with Brawl Stars: vote on the ideas fans want most, or request the next game, creator or company profile.">
<style>
  :root{
    color-scheme:dark;
    --bg:#0a0b12;--bg-soft:#10131d;--surface:#151926;--surface-2:#1b2030;
    --text:#f5f7fb;--muted:#aab2c6;--line:#30384d;--line-soft:#242b3d;
    --yellow:#ffd129;--yellow-ink:#211900;--blue:#63b3ff;--purple:#b986ff;
    --green:#55e59a;--red:#ff718c;--gold:#ffd700;--silver:#cbd3e3;--bronze:#df9f69;
    --shadow:0 18px 60px rgba(0,0,0,.34);--focus:0 0 0 3px rgba(99,179,255,.35);
    --radius:18px;--ease:cubic-bezier(.2,.7,.2,1);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;min-height:100dvh;background:var(--bg);color:var(--text);
    font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    line-height:1.5;overflow-x:hidden;
  }
  button,input,textarea{font:inherit}
  button,a{touch-action:manipulation}
  button{cursor:pointer}
  a{color:inherit}
  .bgfx{position:fixed;inset:0;z-index:-2;pointer-events:none;background:
    radial-gradient(800px 520px at 8% -8%,rgba(255,209,41,.12),transparent 62%),
    radial-gradient(760px 540px at 94% 3%,rgba(185,134,255,.13),transparent 64%),
    radial-gradient(900px 620px at 50% 112%,rgba(99,179,255,.09),transparent 66%)}
  .gridfx{position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.17;background-image:
    linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
    background-size:32px 32px;mask-image:linear-gradient(to bottom,black,transparent 75%)}
  .wrap{width:min(920px,100%);margin:0 auto;padding:24px 18px 88px}
  .skip-link{position:fixed;left:12px;top:-80px;z-index:100;background:var(--text);color:var(--bg);
    padding:10px 14px;border-radius:10px;font-weight:800}
  .skip-link:focus{top:12px}
  .langbtn{position:fixed;top:12px;right:12px;z-index:30;min-height:44px;padding:9px 15px;
    border-radius:999px;border:1px solid var(--line);background:rgba(21,25,38,.92);color:var(--text);
    font-weight:850;box-shadow:0 8px 30px rgba(0,0,0,.22);backdrop-filter:blur(12px)}
  .langbtn:hover{border-color:var(--yellow)}
  :focus-visible{outline:0;box-shadow:var(--focus)!important}
  .hidden{display:none!important}
  .sr-only{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
    clip:rect(0,0,0,0);white-space:nowrap;border:0}

  header{text-align:center;padding:34px 0 12px}
  .logo{display:inline-block;text-decoration:none;font-size:clamp(2.35rem,8vw,4.1rem);font-weight:950;
    letter-spacing:-.07em;line-height:1;background:linear-gradient(100deg,var(--yellow) 8%,var(--blue) 55%,var(--purple));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .tag{max-width:720px;margin:14px auto 0;color:var(--muted);font-size:clamp(1rem,2.4vw,1.18rem)}
  .tag b{color:var(--text)}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;margin-bottom:12px;color:var(--yellow);
    text-transform:uppercase;letter-spacing:.14em;font-size:.72rem;font-weight:900}
  .eyebrow:before{content:"";width:22px;height:1px;background:currentColor}

  .search-area{position:relative;max-width:760px;margin:25px auto 0;text-align:left}
  .field-label{display:block;margin:0 0 7px;font-size:.82rem;font-weight:800;color:var(--muted)}
  .search-shell{display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:10px;
    padding:7px 8px 7px 16px;border:1px solid #3d4660;border-radius:17px;background:rgba(21,25,38,.96);
    box-shadow:var(--shadow);transition:border-color .2s ease,transform .2s var(--ease)}
  .search-shell:focus-within{border-color:var(--blue);transform:translateY(-1px)}
  .search-shell svg{width:23px;height:23px;color:var(--blue)}
  .search-shell input{min-width:0;height:48px;border:0;outline:0;background:transparent;color:var(--text);
    font-size:clamp(1rem,2.4vw,1.08rem)}
  .search-shell input::placeholder{color:#7f899f}
  .search-btn,.primary-btn{min-height:44px;border:0;border-radius:12px;padding:10px 18px;
    background:linear-gradient(100deg,var(--yellow),#ffb91f);color:var(--yellow-ink);font-weight:950;
    transition:filter .18s ease,transform .18s var(--ease)}
  .search-btn:hover,.primary-btn:hover{filter:brightness(1.07)}
  .search-btn:active,.primary-btn:active{transform:scale(.98)}
  .search-panel{position:absolute;left:0;right:0;top:calc(100% + 8px);z-index:25;padding:8px;
    border:1px solid var(--line);border-radius:15px;background:#141824;box-shadow:var(--shadow)}
  .search-result{display:grid;grid-template-columns:42px 1fr auto;align-items:center;gap:11px;width:100%;
    min-height:56px;padding:8px;border:0;border-radius:11px;background:transparent;color:var(--text);
    text-align:left;text-decoration:none}
  .search-result:hover,.search-result:focus-visible{background:var(--surface-2)}
  .result-avatar{display:grid;place-items:center;width:42px;height:42px;border:1px solid var(--line);
    border-radius:12px;background:var(--bg-soft);font-size:1.35rem}
  .result-title{display:block;font-weight:850}
  .result-meta{display:block;color:var(--muted);font-size:.78rem}
  .result-arrow{color:var(--muted);font-size:1.15rem}
  .search-empty{padding:14px;color:var(--muted)}
  .search-empty b{display:block;color:var(--text);margin-bottom:3px}
  .search-empty button{margin-top:10px}

  .crumb{display:flex;align-items:center;justify-content:center;gap:8px;margin:18px auto 0;
    color:var(--muted);font-size:.9rem}
  .crumb a{color:var(--blue);text-decoration:none}
  .crumb .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 5px rgba(85,229,154,.1)}

  .stats{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:24px 0 0}
  .stat{min-width:118px;padding:10px 15px;border:1px solid var(--line-soft);border-radius:14px;
    background:rgba(21,25,38,.78);text-align:center}
  .stat .n{font-size:1.28rem;font-weight:950;color:var(--yellow);font-variant-numeric:tabular-nums}
  .stat.green .n{color:var(--green)}
  .stat .l{margin-top:1px;color:var(--muted);font-size:.7rem;text-transform:uppercase;letter-spacing:.08em}

  .section-head{display:flex;align-items:end;justify-content:space-between;gap:16px;margin:34px 0 13px}
  .section-head h2{margin:0;font-size:clamp(1.18rem,3vw,1.48rem)}
  .section-head p{margin:3px 0 0;color:var(--muted);font-size:.88rem}
  .how{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin:30px 0 0}
  .step{padding:17px;border:1px solid var(--line-soft);border-radius:var(--radius);background:rgba(21,25,38,.72)}
  .step-icon{display:grid;place-items:center;width:38px;height:38px;border-radius:11px;background:var(--surface-2);
    color:var(--blue)}
  .step-icon svg{width:21px;height:21px}
  .step-title{margin-top:11px;font-weight:900}
  .step-desc{margin-top:4px;color:var(--muted);font-size:.8rem}

  .sections{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
  .sec-card{display:flex;align-items:center;gap:14px;min-height:112px;padding:18px;border:1px solid var(--line);
    border-radius:var(--radius);background:var(--surface);color:var(--text);text-decoration:none;
    transition:transform .18s var(--ease),border-color .18s ease,box-shadow .18s ease}
  .sec-card:hover{transform:translateY(-2px);border-color:var(--yellow);box-shadow:0 12px 38px rgba(0,0,0,.28)}
  .sec-em{display:grid;place-items:center;flex:0 0 54px;height:54px;border-radius:15px;background:var(--surface-2);font-size:1.75rem}
  .sec-info{min-width:0;flex:1}
  .sec-name{font-size:1.08rem;font-weight:950}
  .sec-tag{margin-top:2px;color:var(--muted);font-size:.8rem}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border:1px solid var(--line-soft);
    border-radius:999px;background:var(--bg-soft);color:var(--muted);font-size:.7rem}
  .chip.hot{color:var(--yellow)}

  .trending{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .trend-card{display:flex;flex-direction:column;min-height:166px;padding:15px;border:1px solid var(--line);
    border-radius:16px;background:linear-gradient(145deg,rgba(27,32,48,.96),rgba(17,20,31,.96));
    text-decoration:none;transition:transform .18s var(--ease),border-color .18s ease}
  .trend-card:hover{transform:translateY(-2px);border-color:var(--blue)}
  .trend-rank{color:var(--yellow);font-size:.73rem;font-weight:950;letter-spacing:.08em}
  .trend-title{margin-top:10px;font-weight:850;line-height:1.35}
  .trend-meta{margin-top:auto;padding-top:12px;color:var(--muted);font-size:.75rem}

  .panel{margin-top:30px;padding:21px;border:1px solid var(--line);border-radius:var(--radius);
    background:linear-gradient(135deg,rgba(255,209,41,.055),rgba(185,134,255,.055))}
  .panel h2{margin:0;font-size:1.18rem}
  .panel-intro{margin:5px 0 17px;color:var(--muted);font-size:.88rem}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .field{min-width:0}
  .field.full{grid-column:1/-1}
  .field label{display:block;margin:0 0 6px;color:var(--text);font-size:.8rem;font-weight:850}
  .field .optional{color:var(--muted);font-weight:600}
  .field input,.field textarea,.filter-input{
    width:100%;min-height:46px;padding:11px 12px;border:1px solid var(--line);border-radius:11px;
    background:var(--bg-soft);color:var(--text);outline:0}
  .field textarea{min-height:92px;resize:vertical}
  .field input:focus,.field textarea:focus,.filter-input:focus{border-color:var(--blue);box-shadow:var(--focus)}
  .helper{display:block;margin-top:5px;color:var(--muted);font-size:.73rem}
  .form-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:14px}
  .secondary-btn{min-height:44px;padding:9px 15px;border:1px solid var(--line);border-radius:11px;
    background:var(--surface-2);color:var(--text);font-weight:850}
  .secondary-btn:hover{border-color:var(--blue)}
  .button-icon{display:inline-flex;align-items:center;gap:7px}
  .button-icon svg{width:18px;height:18px}
  button:disabled{opacity:.52;cursor:not-allowed}
  .form-status{min-height:23px;margin-top:10px;font-size:.82rem;font-weight:750}
  .form-status.ok{color:var(--green)}
  .form-status.err{color:var(--red)}
  .hp{position:absolute!important;left:-10000px!important;width:1px!important;height:1px!important;overflow:hidden!important}

  .claim-bar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin:23px 0 0;padding:14px 16px;
    border:1px solid rgba(255,209,41,.28);border-radius:15px;background:rgba(255,209,41,.05)}
  .claim-copy b{display:block}
  .claim-copy span{display:block;color:var(--muted);font-size:.8rem}

  .profile-tools{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:end;gap:12px;margin:24px 0 12px}
  .filter-wrap{position:relative}
  .filter-wrap svg{position:absolute;left:12px;top:50%;width:18px;height:18px;transform:translateY(-50%);color:var(--muted)}
  .filter-input{padding-left:39px}
  .tabs{display:flex;gap:6px;padding:5px;border:1px solid var(--line);border-radius:13px;background:var(--bg-soft)}
  .tab{min-height:42px;padding:8px 12px;border:0;border-radius:9px;background:transparent;color:var(--muted);
    font-size:.82rem;font-weight:850;white-space:nowrap}
  .tab:hover{color:var(--text)}
  .tab.active{background:var(--surface-2);color:var(--text);box-shadow:0 5px 18px rgba(0,0,0,.22)}

  .podium{display:grid;grid-template-columns:1fr 1.12fr 1fr;align-items:end;gap:9px;margin:18px 0 16px}
  .podium-card{position:relative;min-width:0;padding:15px 12px;border:1px solid var(--line);border-radius:15px 15px 10px 10px;
    background:linear-gradient(160deg,var(--surface-2),var(--surface));text-align:center;cursor:pointer;
    transition:transform .2s var(--ease),border-color .2s ease}
  .podium-card:hover{transform:translateY(-3px)}
  .podium-card.first{min-height:142px;border-color:rgba(255,215,0,.6);box-shadow:0 0 34px rgba(255,215,0,.1)}
  .podium-card.second{min-height:122px;border-color:rgba(203,211,227,.42)}
  .podium-card.third{min-height:110px;border-color:rgba(223,159,105,.42)}
  .podium-medal{font-size:1.4rem;font-weight:950}
  .first .podium-medal{color:var(--gold)}.second .podium-medal{color:var(--silver)}.third .podium-medal{color:var(--bronze)}
  .podium-title{margin-top:7px;font-size:.78rem;font-weight:800;line-height:1.3;display:-webkit-box;
    -webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .podium-score{margin-top:7px;color:var(--muted);font-size:.7rem}

  .list{display:flex;flex-direction:column;gap:11px}
  .idea-card{display:grid;grid-template-columns:42px minmax(0,1fr) auto;gap:13px;align-items:center;
    padding:15px;border:1px solid var(--line);border-radius:16px;background:var(--surface);
    transition:transform .18s var(--ease),border-color .18s ease,box-shadow .18s ease}
  .idea-card:hover{transform:translateY(-1px);border-color:#44506d;box-shadow:0 9px 30px rgba(0,0,0,.22)}
  .idea-card.top1{border-color:rgba(255,215,0,.48)}.idea-card.top2{border-color:rgba(203,211,227,.37)}
  .idea-card.top3{border-color:rgba(223,159,105,.37)}
  .idea-card.team-pick{border-color:rgba(255,215,0,.75);background:linear-gradient(135deg,rgba(255,215,0,.055),var(--surface))}
  .idea-card.deep-focus{animation:deepPulse 1.1s var(--ease) 2}
  @keyframes deepPulse{50%{box-shadow:0 0 0 4px rgba(99,179,255,.28),0 12px 40px rgba(0,0,0,.3);border-color:var(--blue)}}
  .rank{font-size:1.25rem;font-weight:950;text-align:center;color:var(--muted);font-variant-numeric:tabular-nums}
  .top1 .rank{color:var(--gold)}.top2 .rank{color:var(--silver)}.top3 .rank{color:var(--bronze)}
  .idea-main{min-width:0}
  .team-badge{display:inline-flex;align-items:center;gap:5px;margin-bottom:7px;padding:3px 9px;
    border:1px solid rgba(255,215,0,.42);border-radius:999px;background:rgba(255,215,0,.12);
    color:var(--gold);font-size:.68rem;font-weight:950;letter-spacing:.04em}
  .team-badge svg{width:14px;height:14px}
  .idea-title{font-weight:850;line-height:1.36}
  .score-row{display:flex;align-items:center;gap:8px;margin-top:9px}
  .score-track{flex:1;height:6px;border-radius:99px;background:var(--bg-soft);overflow:hidden}
  .score-fill{height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--purple));
    transition:width .65s var(--ease)}
  .team-pick .score-fill{background:linear-gradient(90deg,var(--gold),#ffad22)}
  .score-label{min-width:54px;text-align:right;color:var(--blue);font-size:.76rem;font-weight:900}
  .team-pick .score-label{color:var(--gold)}
  .reason{margin-top:6px;color:var(--muted);font-size:.79rem;font-style:italic}
  .idea-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:9px}
  .source-link{color:var(--blue);text-decoration:none}
  .source-link:hover{text-decoration:underline}
  .idea-actions{display:flex;align-items:center;gap:8px}
  .vote-btn,.icon-btn{min-width:48px;min-height:48px;border:1px solid var(--line);border-radius:12px;
    background:var(--bg-soft);color:var(--text);font-weight:900}
  .vote-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 10px}
  .vote-btn:hover{border-color:var(--green);color:var(--green)}
  .vote-btn.voted{border-color:var(--green);background:rgba(85,229,154,.1);color:var(--green)}
  .vote-count{font-size:.98rem;font-variant-numeric:tabular-nums}
  .vote-label{color:var(--muted);font-size:.57rem;letter-spacing:.07em}
  .icon-btn{display:grid;place-items:center;padding:0;color:var(--muted)}
  .icon-btn:hover{border-color:var(--blue);color:var(--blue)}
  .icon-btn svg{width:19px;height:19px}
  .empty-state{padding:36px 18px;border:1px dashed var(--line);border-radius:16px;color:var(--muted);text-align:center}
  .loading{padding:42px 10px;color:var(--muted);text-align:center}
  .spinner{display:inline-block;width:22px;height:22px;margin-bottom:9px;border:3px solid var(--line);
    border-top-color:var(--yellow);border-radius:50%;animation:spin .85s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .toast{position:fixed;left:50%;bottom:22px;z-index:50;width:min(440px,calc(100% - 28px));padding:13px 16px;
    border:1px solid var(--line);border-radius:13px;background:#171c29;color:var(--text);
    box-shadow:var(--shadow);transform:translate(-50%,120px);opacity:0;pointer-events:none;
    transition:transform .25s var(--ease),opacity .2s ease}
  .toast.show{transform:translate(-50%,0);opacity:1}
  .toast.ok{border-color:rgba(85,229,154,.55)}.toast.err{border-color:rgba(255,113,140,.6)}
  footer{margin-top:38px;padding-top:20px;border-top:1px solid var(--line-soft);color:var(--muted);
    text-align:center;font-size:.78rem;line-height:1.7}
  footer b{color:var(--text)}
  .privacy-note{margin-top:9px;color:var(--muted);font-size:.72rem}
  .retry-btn{margin-top:12px}

  @media (max-width:760px){
    .wrap{padding-top:18px}
    .how{grid-template-columns:1fr}
    .sections{grid-template-columns:1fr}
    .trending{grid-template-columns:1fr}
    .trend-card{min-height:120px}
    .profile-tools{grid-template-columns:1fr}
    .tabs{overflow-x:auto}
    .tab{flex:1}
  }
  @media (max-width:560px){
    .wrap{padding-inline:13px}
    header{padding-top:42px}
    .search-shell{grid-template-columns:21px 1fr;padding-right:9px}
    .search-btn{grid-column:1/-1;width:100%}
    .form-grid{grid-template-columns:1fr}
    .field.full{grid-column:auto}
    .claim-bar{align-items:flex-start;flex-direction:column}
    .podium{gap:6px}
    .podium-card{padding:11px 7px}
    .podium-card.first{min-height:135px}.podium-card.second{min-height:116px}.podium-card.third{min-height:105px}
    .idea-card{grid-template-columns:30px minmax(0,1fr);gap:10px;padding:13px}
    .idea-actions{grid-column:2;justify-content:flex-end}
    .rank{font-size:1.05rem}
    .reason{font-size:.76rem}
    .stats{gap:7px}.stat{min-width:102px;padding-inline:10px}
  }
  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto}
    *,*:before,*:after{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>
<div class="bgfx"></div>
<div class="gridfx"></div>
<button class="langbtn" id="lang-btn" type="button">ES</button>

<main class="wrap" id="main">
  <header>
    <div class="eyebrow" id="eyebrow"></div>
    <a class="logo" id="logo" href="./">FANRANK</a>
    <div class="tag" id="hero-tag"></div>

    <form class="search-area" id="search-form" role="search" novalidate>
      <label class="field-label" id="search-label" for="global-search"></label>
      <div class="search-shell">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.2-3.2"></path>
        </svg>
        <input id="global-search" maxlength="120" autocomplete="off" enterkeyhint="search">
        <button class="search-btn" id="search-btn" type="submit"></button>
      </div>
      <div class="search-panel hidden" id="search-panel" aria-live="polite"></div>
    </form>

    <div class="crumb" id="crumb"><span class="dot"></span><span id="crumb-text"></span></div>
  </header>

  <div class="stats" id="stats"></div>

  <section id="home-view">
    <div class="how" id="how"></div>

    <div class="section-head">
      <div><h2 id="profiles-title"></h2><p id="profiles-subtitle"></p></div>
    </div>
    <div class="sections" id="sections">
      <div class="loading"><span class="spinner"></span><div id="loading-text"></div></div>
    </div>

    <div class="section-head">
      <div><h2 id="trending-title"></h2><p id="trending-subtitle"></p></div>
    </div>
    <div class="trending" id="trending"></div>

    <section class="panel" id="request-panel">
      <h2 id="request-title"></h2>
      <p class="panel-intro" id="request-intro"></p>
      <form id="request-form" novalidate>
        <div class="form-grid">

  byId("claim-name-label").textContent = tx("claim_name_label");
  byId("claim-role-label").textContent = tx("claim_role_label");
  byId("claim-contact-label").textContent = tx("claim_contact_label");

async function loadDirectory(){
  var result = await Promise.all([
    api("fr_sections_stats?select=*"),
    api("fr_ranking?select=*&limit=500")
  ]);
  sections = Array.isArray(result[0]) ? result[0] : [];
  allIdeas = Array.isArray(result[1]) ? result[1] : [];
  sections.sort(function(a,b){return (b.fan_votes*5+b.ideas)-(a.fan_votes*5+a.ideas);});
}

function renderHow(){
  byId("how").innerHTML = tx("how").map(function(step){
    return '<article class="step"><div class="step-icon">' + icon(step[0]) + '</div><div class="step-title">' +
      esc(step[1]) + '</div><div class="step-desc">' + esc(step[2]) + '</div></article>';

function renderHomeStats(){

    statHtml(sections.length,tx("stats_profiles")) +
    statHtml(sections.reduce(function(sum,item){return sum+Number(item.ideas||0);},0),tx("stats_ideas")) +

}
function renderSections(){
  if(!sections.length){

      sendEvent("profile_open",{section:link.dataset.profile,value:"home_card"});
    });

}
function trendingIdeas(){
  return allIdeas.slice().sort(function(a,b){
    var av = (a.owner_pick ? 1000 : 0) + Number(a.ai_score||0) + Math.min(Number(a.web_votes||0)*5,30);
    var bv = (b.owner_pick ? 1000 : 0) + Number(b.ai_score||0) + Math.min(Number(b.web_votes||0)*5,30);
    return bv-av || Number(b.origin_upvotes||0)-Number(a.origin_upvotes||0);
  }).slice(0,3);
}
function renderTrending(){
  var top = trendingIdeas();
  byId("trending").innerHTML = top.map(function(item,index){
    var meta = sections.find(function(s){return s.slug === item.section;});
    return '<a class="trend-card" href="' + esc(ideaUrl(item)) + '" data-idea-open="' + item.id + '">' +
      '<span class="trend-rank">' + esc(tx("top_label")) + ' · #' + (index+1) + '</span>' +
      '<span class="trend-title">' + esc(ideaTitle(item)) + '</span>' +
      '<span class="trend-meta">' + esc(meta ? meta.name : item.section) + ' · ' +
      fmt(item.web_votes) + ' ' + esc(tx("fan_votes")) + '</span></a>';
  }).join("");
}
function loadHome(){
  document.title = LANG === "es" ? "FanRank — las mejores ideas, ordenadas" : "FanRank — the best ideas, ranked";
  byId("hero-tag").innerHTML = tx("hero_home");
  byId("crumb-text").textContent = tx("all_profiles");
  renderHow();
  renderHomeStats();
  renderSections();
  renderTrending();
}

function normalize(value){
  return String(value || "").toLocaleLowerCase(LANG === "es" ? "es" : "en")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}
function searchMatches(query){
  var needle = normalize(query);
  var sectionMatches = sections.filter(function(item){
    return normalize(item.name + " " + sectionTagline(item) + " " + item.kind).indexOf(needle) >= 0;
  }).slice(0,4);
  var ideaMatches = allIdeas.filter(function(item){
    return normalize(ideaTitle(item) + " " + ideaReason(item)).indexOf(needle) >= 0;
  }).slice(0,5);
  return {sections:sectionMatches,ideas:ideaMatches};
}
function renderSearchPanel(query){
  var panel = byId("search-panel");
  if(!query.trim()){
    panel.classList.add("hidden");
    panel.innerHTML = "";
    return;
  }
  var matches = searchMatches(query);
  var html = "";
  matches.sections.forEach(function(item){
    html += '<a class="search-result" href="' + esc(sectionUrl(item.slug)) + '" data-search-profile="' + esc(item.slug) + '">' +
      '<span class="result-avatar" aria-hidden="true">' + esc(item.emoji || "•") + '</span>' +
      '<span><span class="result-title">' + esc(item.name) + '</span><span class="result-meta">' + esc(tx("search_profile")) +
      ' · ' + fmt(item.ideas) + ' ' + esc(tx("stats_ideas")) + '</span></span><span class="result-arrow">→</span></a>';
  });
  matches.ideas.forEach(function(item){
    html += '<a class="search-result" href="' + esc(ideaUrl(item)) + '" data-search-idea="' + item.id + '">' +
      '<span class="result-avatar" aria-hidden="true">#</span><span><span class="result-title">' + esc(ideaTitle(item)) +
      '</span><span class="result-meta">' + esc(tx("search_idea")) + ' · ' + esc(item.section) +
      '</span></span><span class="result-arrow">→</span></a>';
  });
  if(!html){
    html = '<div class="search-empty"><b>' + esc(tx("search_no_title")) + '</b>' + esc(tx("search_no_copy")) +
      '<br><button class="secondary-btn" id="search-request" type="button">' + esc(tx("search_request")) + '</button></div>';
  }
  panel.innerHTML = html;
  panel.classList.remove("hidden");
  document.querySelectorAll("[data-search-profile]").forEach(function(link){
    link.addEventListener("click",function(){
      sendEvent("search",{section:link.dataset.searchProfile,value:query});
      sendEvent("profile_open",{section:link.dataset.searchProfile,value:"search"});
    });
  });
  document.querySelectorAll("[data-search-idea]").forEach(function(link){
    link.addEventListener("click",function(){
      sendEvent("search",{idea_id:Number(link.dataset.searchIdea),value:query});
      sendEvent("idea_open",{idea_id:Number(link.dataset.searchIdea),value:"search"});
    });
  });
  if(byId("search-request")){
    byId("search-request").addEventListener("click",function(){requestFromSearch(query);});
  }
}
function requestFromSearch(query){
  sendEvent("search",{value:query});
  byId("search-panel").classList.add("hidden");
  if(SECTION){
    location.href = location.pathname + (LANG === "es" ? "?lang=es" : "") + "#request-panel";
    return;
  }
  byId("request-target").value = query.trim();
  byId("request-panel").scrollIntoView({behavior:REDUCED ? "auto" : "smooth",block:"center"});
  setTimeout(function(){byId("request-target").focus();},REDUCED ? 0 : 350);
}

function sortedIdeas(source){
  var list = (source || ideas).slice();
  if(sortMode === "ai"){
    list.sort(function(a,b){
      return Number(b.owner_pick)-Number(a.owner_pick) || Number(b.ai_score)-Number(a.ai_score) ||
        Number(b.web_votes)-Number(a.web_votes) || Number(b.origin_upvotes)-Number(a.origin_upvotes);
    });
  }else if(sortMode === "source"){
    list.sort(function(a,b){return Number(b.origin_upvotes)-Number(a.origin_upvotes) || Number(b.ai_score)-Number(a.ai_score);});
  }else{
    list.sort(function(a,b){return Number(b.web_votes)-Number(a.web_votes) || Number(b.ai_score)-Number(a.ai_score);});
  }
  return list;
}
function fanPosition(id){
  var fanList = ideas.slice().sort(function(a,b){
    return Number(b.web_votes)-Number(a.web_votes) || Number(b.ai_score)-Number(a.ai_score);
  });
  return fanList.findIndex(function(item){return item.id === id;}) + 1;
}
function renderProfileStats(){
  byId("stats").innerHTML =
    statHtml(ideas.length,tx("stats_ideas")) +
    statHtml(fmt(ideas.reduce(function(sum,item){return sum+Number(item.origin_upvotes||0);},0)),tx("source_votes")) +
    statHtml(ideas.reduce(function(sum,item){return sum+Number(item.web_votes||0);},0),tx("fan_votes"),true);
}
function renderPodium(){
  var top = sortedIdeas(ideas).slice(0,3);
  var positions = [
    {item:top[1],rank:2,cls:"second"},
    {item:top[0],rank:1,cls:"first"},
    {item:top[2],rank:3,cls:"third"}
  ];
  byId("podium").innerHTML = positions.map(function(entry){
    if(!entry.item){return '<div></div>';}
    var score = sortMode === "fans" ? entry.item.web_votes : sortMode === "source" ? entry.item.origin_upvotes :
      (entry.item.owner_pick ? 100 : entry.item.ai_score);
    return '<button class="podium-card ' + entry.cls + '" type="button" data-podium="' + entry.item.id + '">' +
      '<div class="podium-medal">#' + entry.rank + '</div><div class="podium-title">' + esc(ideaTitle(entry.item)) +
      '</div><div class="podium-score">' + fmt(score) + '</div></button>';
  }).join("");
  document.querySelectorAll("[data-podium]").forEach(function(button){
    button.addEventListener("click",function(){
      var target = byId("idea-" + button.dataset.podium);
      if(target){target.scrollIntoView({behavior:REDUCED ? "auto" : "smooth",block:"center"});}
    });
  });
}
function filteredIdeas(){
  var needle = normalize(profileQuery);
  var source = needle ? ideas.filter(function(item){
    return normalize(ideaTitle(item) + " " + ideaReason(item)).indexOf(needle) >= 0;
  }) : ideas;
  return sortedIdeas(source);
}
function renderIdeas(){
  var list = filteredIdeas();
  var mine = myVotes();
  if(!list.length){
    byId("ideas-list").innerHTML = '<div class="empty-state">' + esc(tx("no_ideas")) + '</div>';
    return;
  }
  byId("ideas-list").innerHTML = list.map(function(item,index){
    var score = item.owner_pick ? 100 : Number(item.ai_score||0);
    var source = safeUrl(item.source_url);
    var rankClass = index === 0 ? "top1" : index === 1 ? "top2" : index === 2 ? "top3" : "";
    var voted = mine.indexOf(item.id) >= 0;
    return '<article class="idea-card ' + rankClass + ' ' + (item.owner_pick ? "team-pick" : "") +
      '" id="idea-' + item.id + '">' +
      '<div class="rank">' + (index+1) + '</div><div class="idea-main">' +
      (item.owner_pick ? '<div class="team-badge">' + icon("crown") + esc(tx("team_pick")) + '</div>' : "") +
      '<div class="idea-title">' + esc(ideaTitle(item)) + '</div><div class="score-row"><div class="score-track">' +
      '<div class="score-fill" data-score="' + score + '"></div></div><div class="score-label">' +
      (item.owner_pick ? "100" : esc(tx("ai_score")) + " " + score) + '</div></div>' +
      '<div class="reason">' + esc(ideaReason(item)) + '</div><div class="idea-meta">' +
      '<span class="chip">' + fmt(item.origin_upvotes) + ' ' + esc(tx("source_votes")) + '</span>' +
      (source ? '<a class="chip source-link" href="' + esc(source) + '" target="_blank" rel="noopener noreferrer">' +
      esc(tx("source")) + ' ↗</a>' : "") + '</div></div><div class="idea-actions">' +
      '<button class="icon-btn" type="button" data-share="' + item.id + '" aria-label="' + esc(tx("share")) +
      '" title="' + esc(tx("share")) + '">' + icon("share") + '</button>' +
      '<button class="vote-btn ' + (voted ? "voted" : "") + '" type="button" data-vote="' + item.id + '" ' +
      (voted ? "disabled" : "") + '><span class="vote-count">' + Number(item.web_votes||0) +
      '</span><span class="vote-label">' + esc(voted ? tx("voted") : tx("vote")) + '</span></button></div></article>';
  }).join("");
  requestAnimationFrame(function(){
    document.querySelectorAll(".score-fill").forEach(function(fill){fill.style.width = fill.dataset.score + "%";});
  });
  document.querySelectorAll("[data-vote]").forEach(function(button){
    if(!button.disabled){button.addEventListener("click",function(){vote(Number(button.dataset.vote),button);});}
  });
  document.querySelectorAll("[data-share]").forEach(function(button){
    button.addEventListener("click",function(){shareIdea(Number(button.dataset.share));});
  });
}
function renderProfile(){
  renderProfileStats();
  renderPodium();
  renderIdeas();
}
function focusDeepIdea(){
  if(!DEEP_IDEA){return;}
  setTimeout(function(){
    var node = byId("idea-" + DEEP_IDEA);
    if(node){
      node.classList.add("deep-focus");
      node.scrollIntoView({behavior:REDUCED ? "auto" : "smooth",block:"center"});
      sendEvent("idea_open",{section:SECTION,idea_id:DEEP_IDEA,value:"deep_link"});
    }
  },REDUCED ? 0 : 250);
}
function loadSection(){
  secMeta = sections.find(function(item){return item.slug === SECTION;}) || null;
  ideas = allIdeas.filter(function(item){return item.section === SECTION;});
  if(!secMeta){
    location.replace(location.pathname + (LANG === "es" ? "?lang=es" : ""));
    return;
  }
  document.title = "FanRank — " + secMeta.name;
  byId("hero-tag").innerHTML = tx("hero_section",esc(secMeta.name));
  byId("crumb-text").innerHTML = '<a href="' + esc(location.pathname + (LANG === "es" ? "?lang=es" : "")) + '">' +
    esc(tx("all_profiles")) + '</a> <span aria-hidden="true">›</span> ' + esc(secMeta.name);
  byId("home-view").classList.add("hidden");
  byId("section-view").classList.remove("hidden");
  renderProfile();
  focusDeepIdea();
  sendEvent("profile_open",{section:SECTION,value:"page_load"});
}

async function vote(id,button){
  setBusy(button,true);
  try{
    await postRow("fr_votes",{idea_id:id,voter:visitorId()});
    markVoted(id);
    var item = ideas.find(function(row){return row.id === id;});
    if(item){item.web_votes = Number(item.web_votes||0)+1;}
    var globalItem = allIdeas.find(function(row){return row.id === id;});
    if(globalItem && globalItem !== item){globalItem.web_votes = Number(globalItem.web_votes||0)+1;}
    renderProfile();
    sendEvent("vote",{section:SECTION,idea_id:id});
    showToast(tx("vote_rank",fanPosition(id)),"ok");
  }catch(error){
    if(error.status === 409){
      markVoted(id);
      renderProfile();
      showToast(tx("already_voted"),"ok");
    }else{
      setBusy(button,false);
      showToast(tx("generic_error"),"err");
    }
  }
}
async function shareIdea(id){
  var item = ideas.find(function(row){return row.id === id;});
  if(!item){return;}
  var shareData = {title:"FanRank — " + secMeta.name,text:ideaTitle(item),url:ideaUrl(item)};
  try{
    if(navigator.share){
      await navigator.share(shareData);
    }else if(navigator.clipboard){
      await navigator.clipboard.writeText(shareData.url);
    }else{
      window.prompt(tx("share"),shareData.url);
    }
    sendEvent("idea_share",{section:SECTION,idea_id:id});
    showToast(tx("shared"),"ok");
  }catch(error){
    if(error && error.name !== "AbortError"){showToast(tx("generic_error"),"err");}
  }
}

byId("lang-btn").addEventListener("click",function(){
  var next = LANG === "es" ? "en" : "es";
  localStorage.setItem("fr_lang",next);
  var nextParams = new URLSearchParams(location.search);
  if(next === "es"){nextParams.set("lang","es");}else{nextParams.delete("lang");}
  location.search = nextParams.toString();
});
byId("global-search").addEventListener("input",function(event){renderSearchPanel(event.target.value);});
byId("global-search").addEventListener("focus",function(event){renderSearchPanel(event.target.value);});
byId("search-form").addEventListener("submit",function(event){
  event.preventDefault();
  var query = byId("global-search").value.trim();
  if(!query){byId("global-search").focus();return;}
  var matches = searchMatches(query);
  sendEvent("search",{value:query});
  if(matches.sections.length){
    sendEvent("profile_open",{section:matches.sections[0].slug,value:"search_submit"});
    location.href = sectionUrl(matches.sections[0].slug);
  }else if(matches.ideas.length){
    sendEvent("idea_open",{section:matches.ideas[0].section,idea_id:matches.ideas[0].id,value:"search_submit"});
    location.href = ideaUrl(matches.ideas[0]);
  }else{
    requestFromSearch(query);
  }
});
document.addEventListener("click",function(event){
  if(!byId("search-form").contains(event.target)){byId("search-panel").classList.add("hidden");}
});

document.querySelectorAll(".tab").forEach(function(tab){
  tab.addEventListener("click",function(){
    document.querySelectorAll(".tab").forEach(function(other){
      other.classList.remove("active");
      other.setAttribute("aria-selected","false");
    });
    tab.classList.add("active");
    tab.setAttribute("aria-selected","true");
    sortMode = tab.dataset.sort;
    renderProfile();
  });
});
byId("idea-filter").addEventListener("input",function(event){
  profileQuery = event.target.value;
  renderIdeas();
});

byId("claim-open").addEventListener("click",function(){
  byId("claim-panel").classList.remove("hidden");
  byId("claim-panel").scrollIntoView({behavior:REDUCED ? "auto" : "smooth",block:"start"});
  setTimeout(function(){byId("claim-name").focus();},REDUCED ? 0 : 300);
});
byId("claim-cancel").addEventListener("click",function(){
  byId("claim-panel").classList.add("hidden");
  byId("claim-open").focus();
});

byId("request-form").addEventListener("submit",async function(event){
  event.preventDefault();
  var target = byId("request-target").value.trim();
  if(target.length < 3){
    setStatus("request-status",tx("required_error"),"err");
    byId("request-target").focus();
    return;
  }
  if(!validTiming("request-website","fr_last_request",30000)){
    setStatus("request-status",tx("too_fast"),"err");
    return;
  }
  var button = byId("request-send");
  setBusy(button,true);
  setStatus("request-status","","");
  try{
    await postRow("fr_submissions",{
      section:"section-request",title:target,
      author:byId("request-name").value.trim() || null,
      contact:byId("request-contact").value.trim() || null,
      language:LANG,approved:false
    });
    markWrite("fr_last_request");
    sendEvent("section_request",{value:target});
    setStatus("request-status",tx("request_ok"),"ok");
    byId("request-form").reset();
    formStartedAt = Date.now();
  }catch(error){
    setStatus("request-status",tx("generic_error"),"err");
  }finally{setBusy(button,false);}
});

byId("submit-form").addEventListener("submit",async function(event){
  event.preventDefault();
  var title = byId("submit-idea").value.trim();
  if(title.length < 3){
    setStatus("submit-status",tx("required_error"),"err");
    byId("submit-idea").focus();
    return;
  }
  if(!validTiming("submit-website","fr_last_submission",30000)){
    setStatus("submit-status",tx("too_fast"),"err");
    return;
  }
  var button = byId("submit-send");
  setBusy(button,true);
  setStatus("submit-status","","");
  try{
    await postRow("fr_submissions",{
      section:SECTION,title:title,
      details:byId("submit-details").value.trim() || null,
      author:byId("submit-name").value.trim() || null,
      contact:byId("submit-contact").value.trim() || null,
      language:LANG,approved:false
    });
    markWrite("fr_last_submission");
    sendEvent("submission",{section:SECTION,value:title.slice(0,180)});
    setStatus("submit-status",tx("submit_ok"),"ok");
    byId("submit-form").reset();
    formStartedAt = Date.now();
  }catch(error){
    setStatus("submit-status",tx("generic_error"),"err");
  }finally{setBusy(button,false);}
});

byId("claim-form").addEventListener("submit",async function(event){
  event.preventDefault();
  var name = byId("claim-name").value.trim();
  var role = byId("claim-role").value.trim();
  var contact = byId("claim-contact").value.trim();
  if(name.length < 2 || role.length < 2 || contact.length < 3){
    setStatus("claim-status",tx("required_error"),"err");
    if(name.length < 2){byId("claim-name").focus();}
    else if(role.length < 2){byId("claim-role").focus();}
    else{byId("claim-contact").focus();}
    return;
  }
  if(!validTiming("claim-website","fr_last_claim",60000)){
    setStatus("claim-status",tx("too_fast"),"err");
    return;
  }
  var proof = byId("claim-proof").value.trim();
  if(proof && !safeUrl(proof)){
    setStatus("claim-status",tx("required_error"),"err");
    byId("claim-proof").focus();
    return;
  }
  var button = byId("claim-send");
  setBusy(button,true);
  setStatus("claim-status","","");
  try{
    await postRow("fr_claims",{
      section:SECTION,name:name,role:role,contact:contact,
      proof_url:proof || null,
      message:byId("claim-message").value.trim() || null,
      status:"pending"
    });
    markWrite("fr_last_claim");
    sendEvent("claim_request",{section:SECTION});
    setStatus("claim-status",tx("claim_ok"),"ok");
    byId("claim-form").reset();
    formStartedAt = Date.now();
  }catch(error){
    setStatus("claim-status",tx("generic_error"),"err");
  }finally{setBusy(button,false);}
});

async function boot(){
  applyStaticText();
  byId("hero-tag").innerHTML = SECTION ? tx("loading") : tx("hero_home");
  byId("crumb-text").textContent = SECTION ? tx("loading") : tx("all_profiles");
  sendEvent("page_view",{section:SECTION || null});
  try{
    await loadDirectory();
    if(SECTION){loadSection();}else{loadHome();}
  }catch(error){
    byId("sections").innerHTML = '<div class="empty-state">' + esc(tx("generic_error")) +
      '<br><button class="secondary-btn retry-btn" type="button" onclick="location.reload()">' +
      esc(LANG === "es" ? "Reintentar" : "Retry") + '</button></div>';
    byId("hero-tag").textContent = tx("generic_error");
  }
}
boot();
